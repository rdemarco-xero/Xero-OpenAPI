  /Reports/AgedPayablesByContact:
    summary: Retrieve aged payables report by contact
    description: Retrieve aged payables report by contact.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.reports.read
      tags:
      - Accounting
      - Reports
      operationId: getReportAgedPayablesByContact
      summary: List reports for the organisation
      description: Returns the organisation's reports in a Report With Rows response payload. Use the available filtering,
        ordering, paging, or modified-since parameters when the endpoint exposes them.
      parameters:
      - in: query
        required: true
        name: contactId
        description: Unique identifier for a Contact
        example: 00000000-0000-0000-0000-000000000000
        schema:
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      - in: query
        name: date
        description: The date of the Aged Payables By Contact report
        example: '2019-10-31'
        schema:
          type: string
          format: date
          example: '2020-01-01'
      - $ref: '#/components/parameters/FromDate'
      - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Success - return response of type ReportWithRows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportWithRows'
              example:
                Id: 5a33f9d4-44a6-4467-a812-4f025506ee35
                Status: OK
                ProviderName: Java Public Example
                DateTimeUTC: /Date(1555971088085)/
                Reports:
