components:
  parameters:
    BudgetID:
      required: true
      in: path
      name: BudgetID
      description: Unique identifier for Budgets
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    FromDate:
      in: query
      name: fromDate
      description: filter by the from date of the report e.g. 2021-02-01
      example: '2019-10-31'
      schema:
        type: string
        format: date
        example: '2019-10-31'
    JournalID:
      required: true
      in: path
      name: JournalID
      description: Unique identifier for a Journal
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    JournalNumber:
      required: true
      in: path
      name: JournalNumber
      description: Number of a Journal
      example: 1000
      schema:
        type: integer
        example: 1000
    ToDate:
      in: query
      name: toDate
      description: filter by the to date of the report e.g. 2021-02-28
      example: '2019-10-31'
      schema:
        type: string
        format: date
        example: '2019-10-31'
    ifModifiedSince:
      in: header
      name: If-Modified-Since
      description: Only records created or modified since this timestamp will be returned
      example: '2020-02-06T12:17:43.202-08:00'
      schema:
        type: string
        format: date-time
        example: '2020-02-06T12:17:43.202-08:00'
    requiredHeader:
      in: header
      name: xero-tenant-id
      description: Xero identifier for Tenant
      example: YOUR_XERO_TENANT_ID
      schema:
        type: string
        example: YOUR_XERO_TENANT_ID
      required: true
  responses:
    400Error:
      description: A failed request due to validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    429Error:
      description: Too Many Requests - The rate limit has been exceeded.
      headers:
        Retry-After:
          description: The number of seconds to wait before retrying the request.
          schema:
            type: integer
            example: 5
        xero-correlation-id:
          description: A unique identifier for the request, useful for troubleshooting with support.
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
      content: {}
    500Error:
      description: Internal Server Error - An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            Title: An error occurred
            Detail: An error occurred in Xero. Check the API Status page http://status.developer.xero.com for current service
              status.
            Status: 500
            Instance: 6964b201-1442-41f2-b22f-1e34f5baab08
  schemas:
    AccountType:
      description: See Account Types
      type: string
      enum:
      - BANK
      - CURRENT
      - CURRLIAB
      - DEPRECIATN
      - DIRECTCOSTS
      - EQUITY
      - EXPENSE
      - FIXED
      - INVENTORY
      - LIABILITY
      - NONCURRENT
      - OTHERINCOME
      - OVERHEADS
      - PREPAYMENT
      - REVENUE
      - SALES
      - TERMLIAB
      - PAYG
      example: BANK
    Budget:
      description: Represents the Budget schema used by the Accounting API.
      type: object
      externalDocs:
        url: http://developer.xero.com/documentation/api/budgets/
      properties:
        BudgetID:
          description: Xero identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Type:
          description: Type of Budget. OVERALL or TRACKING
          type: string
          enum:
          - OVERALL
          - TRACKING
          example: ValidationException
        Description:
          description: The Budget description
          maxLength: 255
          type: string
          example: My business checking account
        UpdatedDateUTC:
          description: UTC timestamp of last update to budget
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        BudgetLines:
          description: The BudgetLines value.
          type: array
          items:
            $ref: '#/components/schemas/BudgetLine'
          example:
          - AccountID: 00000000-0000-0000-0000-000000000000
            AccountCode: 090
            BudgetBalances:
            - Period: '2020-01-01'
              Amount: 1.0
              UnitAmount: 1.0
        Tracking:
          description: The Tracking value.
          type: array
          items:
            $ref: '#/components/schemas/TrackingCategory'
          example:
          - TrackingCategoryID: 00000000-0000-0000-0000-000000000000
            TrackingOptionID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
      example:
        BudgetID: 00000000-0000-0000-0000-000000000000
        Type: ValidationException
        Description: My business checking account
    BudgetBalance:
      description: Represents the BudgetBalance schema used by the Accounting API.
      type: object
      properties:
        Period:
          description: Period the amount applies to (e.g. ΓÇ£2019-08ΓÇ¥)
          type: string
          example: '2020-01-01'
        Amount:
          description: LineItem Quantity
          type: number
          format: double
          example: 1.0
        UnitAmount:
          description: Budgeted amount
          type: number
          format: double
          example: 1.0
        Notes:
          description: Any footnotes associated with this balance
          maxLength: 255
          type: string
          example: example
      example:
        Period: '2020-01-01'
        Amount: 1.0
        UnitAmount: 1.0
    BudgetLine:
      description: Represents the BudgetLine schema used by the Accounting API.
      type: object
      externalDocs:
        url: http://developer.xero.com/documentation/api/budgets/
      properties:
        AccountID:
          description: See Accounts
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        AccountCode:
          description: See Accounts
          type: string
          example: 090
        BudgetBalances:
          description: The BudgetBalances value.
          type: array
          items:
            $ref: '#/components/schemas/BudgetBalance'
          example:
          - Period: '2020-01-01'
            Amount: 1.0
            UnitAmount: 1.0
      example:
        AccountID: 00000000-0000-0000-0000-000000000000
        AccountCode: 090
        BudgetBalances:
        - Period: '2020-01-01'
          Amount: 1.0
          UnitAmount: 1.0
    Budgets:
      description: Represents the Budgets schema used by the Accounting API.
      type: object
      properties:
        Budgets:
          description: The Budgets value.
          type: array
          items:
            $ref: '#/components/schemas/Budget'
          example:
          - BudgetID: 00000000-0000-0000-0000-000000000000
            Type: ValidationException
            Description: My business checking account
      example:
        Budgets:
        - BudgetID: 00000000-0000-0000-0000-000000000000
          Type: ValidationException
          Description: My business checking account
    Element:
      description: Represents the Element schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/http-response-codes
      properties:
        ValidationErrors:
          description: Array of Validation Error message
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        BatchPaymentID:
          description: Unique ID for batch payment object with validation error
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        BankTransactionID:
          description: The BankTransactionID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        CreditNoteID:
          description: The CreditNoteID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ContactID:
          description: The ContactID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        InvoiceID:
          description: The InvoiceID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ItemID:
          description: The ItemID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        PurchaseOrderID:
          description: The PurchaseOrderID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      type: object
      example:
        ValidationErrors:
        - Message: One or more validation errors occurred.
        BatchPaymentID: 00000000-0000-0000-0000-000000000000
        BankTransactionID: 00000000-0000-0000-0000-000000000000
    Error:
      description: Represents the Error schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/http-response-codes
      properties:
        ErrorNumber:
          description: Exception number
          type: integer
          example: 10
        Type:
          description: Exception type
          type: string
          example: ValidationException
        Message:
          description: Exception message
          type: string
          example: One or more validation errors occurred.
        Elements:
          description: Array of Elements of validation Errors
          type: array
          items:
            $ref: '#/components/schemas/Element'
          example:
          - ValidationErrors:
            - Message: One or more validation errors occurred.
            BatchPaymentID: 00000000-0000-0000-0000-000000000000
            BankTransactionID: 00000000-0000-0000-0000-000000000000
      type: object
      example:
        ErrorNumber: 10
        Type: ValidationException
        Message: One or more validation errors occurred.
    ErrorResponse:
      type: object
      properties:
        Title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: An error occurred
        Detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: An error occurred in Xero. Check the API Status page...
        Status:
          type: integer
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          example: 500
        Instance:
          type: string
          format: uuid
          description: A URI reference that identifies the specific occurrence of the problem (often used as a Correlation
            ID).
          example: 00000000-0000-0000-0000-000000000000
    Journal:
      description: Represents the Journal schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/journals/
      properties:
        JournalID:
          description: Xero identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        JournalDate:
          description: Date the journal was posted
          type: string
          example: '2020-01-01'
        JournalNumber:
          description: Xero generated journal number
          type: integer
          example: 1000
        CreatedDateUTC:
          description: Created date UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        Reference:
          description: reference field for additional indetifying information
          type: string
          example: Foobar
        SourceID:
          description: The identifier for the source transaction (e.g. InvoiceID)
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        SourceType:
          description: The journal source type. The type of transaction that created the journal
          type: string
          enum:
          - ACCREC
          - ACCPAY
          - ACCRECCREDIT
          - ACCPAYCREDIT
          - ACCRECPAYMENT
          - ACCPAYPAYMENT
          - ARCREDITPAYMENT
          - APCREDITPAYMENT
          - CASHREC
          - CASHPAID
          - TRANSFER
          - ARPREPAYMENT
          - APPREPAYMENT
          - AROVERPAYMENT
          - APOVERPAYMENT
          - EXPCLAIM
          - EXPPAYMENT
          - MANJOURNAL
          - PAYSLIP
          - WAGEPAYABLE
          - INTEGRATEDPAYROLLPE
          - INTEGRATEDPAYROLLPT
          - EXTERNALSPENDMONEY
          - INTEGRATEDPAYROLLPTPAYMENT
          - INTEGRATEDPAYROLLCN
          example: ACCREC
        JournalLines:
          description: See JournalLines
          type: array
          items:
            $ref: '#/components/schemas/JournalLine'
          example:
          - JournalLineID: 7be9db36-3598-4755-ba5c-c2dbc8c4a7a2
            AccountID: ceef66a5-a545-413b-9312-78a53caadbc4
            AccountCode: 090
      type: object
      example:
        JournalID: 00000000-0000-0000-0000-000000000000
        JournalDate: '2020-01-01'
        JournalNumber: 1000
    JournalLine:
      description: Represents the JournalLine schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/journals#JournalLines
      properties:
        JournalLineID:
          description: Xero identifier for Journal
          type: string
          format: uuid
          example: 7be9db36-3598-4755-ba5c-c2dbc8c4a7a2
        AccountID:
          description: See Accounts
          type: string
          format: uuid
          example: ceef66a5-a545-413b-9312-78a53caadbc4
        AccountCode:
          description: See Accounts
          type: string
          example: 090
        AccountType:
          description: The AccountType value.
          allOf:
          - $ref: '#/components/schemas/AccountType'
          type: string
          example: BANK
        AccountName:
          description: See AccountCodes
          type: string
          example: Checking Account
        Description:
          description: The description from the source transaction line item. Only returned if populated.
          type: string
          example: My business checking account
        NetAmount:
          description: Net amount of journal line. This will be a positive value for a debit and negative for a credit
          type: number
          format: double
          example: 4130.98
        GrossAmount:
          description: Gross amount of journal line (NetAmount + TaxAmount).
          type: number
          format: double
          example: 4130.98
        TaxAmount:
          description: Total tax on a journal line
          type: number
          format: double
          readOnly: true
          example: 0.0
        TaxType:
          description: The tax type from taxRates
          type: string
          example: INPUT2
        TaxName:
          description: see TaxRates
          type: string
          example: Tax Exempt
        TrackingCategories:
          description: Optional Tracking Category ΓÇô see Tracking. Any JournalLine can have a maximum of 2 <TrackingCategory>
            elements.
          type: array
          items:
            $ref: '#/components/schemas/TrackingCategory'
          example:
          - TrackingCategoryID: 00000000-0000-0000-0000-000000000000
            TrackingOptionID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
      type: object
      example:
        JournalLineID: 7be9db36-3598-4755-ba5c-c2dbc8c4a7a2
        AccountID: ceef66a5-a545-413b-9312-78a53caadbc4
        AccountCode: 090
    Journals:
      description: Represents the Journals schema used by the Accounting API.
      type: object
      properties:
        Warnings:
          description: Displays array of warning messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        Journals:
          description: The Journals value.
          type: array
          items:
            $ref: '#/components/schemas/Journal'
          example:
          - JournalID: 00000000-0000-0000-0000-000000000000
            JournalDate: '2020-01-01'
            JournalNumber: 1000
      example:
        Warnings:
        - Message: One or more validation errors occurred.
        Journals:
        - JournalID: 00000000-0000-0000-0000-000000000000
          JournalDate: '2020-01-01'
          JournalNumber: 1000
    Report:
      description: Represents the Report schema used by the Accounting API.
