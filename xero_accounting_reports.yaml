        name: offset
        description: Offset by a specified journal number. e.g. journals with a JournalNumber greater than the offset will
          be returned
        example: 10
        schema:
          type: integer
          example: 1
      - in: query
        name: paymentsOnly
        description: Filter to retrieve journals on a cash basis. Journals are returned on an accrual basis by default.
