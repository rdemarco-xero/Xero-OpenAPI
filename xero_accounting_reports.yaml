openapi: 3.0.0
info:
  title: Xero Accounting API
  description: The Xero Accounting API exposes accounting resources for working with contacts, transactions, reports, settings,
    and related organisation data.
  version: 12.0.0
  termsOfService: https://developer.xero.com/xero-developer-platform-terms-conditions/
  contact:
    name: Xero Platform Team
    email: api@xero.com
    url: https://developer.xero.com
servers:
- description: The Xero Accounting API exposes accounting and related functions of the main Xero application and can be used
    for a variety of purposes such as creating transactions like invoices and credit notes, right through to extracting accounting
    data via our reports endpoint.
  url: https://api.xero.com/api.xro/2.0
tags:
- name: Accounting
  description: Core accounting resources including accounts, invoices, contacts, payments, and reports.
- name: Reports
  description: Reporting resources for financial statements and analysis endpoints.
paths:
  /Budgets:
    summary: Retrieve budgets
    description: Retrieve budgets.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.budgets.read
      tags:
      - Accounting
      - Reports
      operationId: getBudgets
      summary: List budget records for the organisation
      description: Returns the organisation's budget-record collection in the budget-list response payload. Use the available
        filtering, ordering, paging, or modified-since parameters when the endpoint exposes them.
      parameters:
      - in: query
        name: IDs
        description: Filter by BudgetID. Allows you to retrieve a specific individual budget.
        style: form
        explode: false
        example: '&quot;00000000-0000-0000-0000-000000000000&quot;'
        schema:
          type: string
          items:
            type: string
            format: uuid
          example:
          - 00000000-0000-0000-0000-000000000000
      - in: query
        name: DateTo
        description: Filter by start date
        example: '2019-10-31'
        schema:
          type: string
          format: date
          example: '2020-01-01'
      - in: query
        name: DateFrom
        description: Filter by end date
        example: '2019-10-31'
        schema:
          type: string
          format: date
          example: '2020-01-01'
      responses:
        '200':
          description: Success - return response of type Budgets array with 0 to N Budgets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budgets'
              example:
                Id: 04e93d48-e72f-4775-b7dd-15a041fab972
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1551399323399)/
                Budgets:
                - BudgetID: 847da917-9565-466c-a9cd-3ecf7eb9d094
                  Status: APPROVED
                  Description: FY2021 budget
                  Type: TRACKING
                  UpdatedDateUTC: /Date(1622138002077+0000)/
                  BudgetLines: []
                  Tracking: []
                - BudgetID: 93a4bab1-0021-4320-a2ec-c250528b4bc5
                  Status: APPROVED
                  Description: Overall Budget
                  Type: OVERALL
                  UpdatedDateUTC: /Date(1622137786913+0000)/
                  BudgetLines: []
                  Tracking: []
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /Budgets/{BudgetID}:
    summary: Retrieve a specific budget
    description: Retrieve a specific budget.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.budgets.read
      tags:
      - Accounting
      - Reports
      operationId: getBudget
      summary: Get the budget identified by budget ID
      description: Returns the requested budget record, identified by the supplied budget ID, in the budget response payload.
      parameters:
      - $ref: '#/components/parameters/BudgetID'
      - in: query
        name: DateTo
        description: Filter by start date
        example: '2019-10-31'
        schema:
          type: string
          format: date
          example: '2020-01-01'
      - in: query
        name: DateFrom
        description: Filter by end date
        example: '2019-10-31'
        schema:
          type: string
          format: date
          example: '2020-01-01'
      responses:
        '200':
          description: Success - return response of type Invoices array with specified Invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budgets'
              example:
                Id: 04e93d48-e72f-4775-b7dd-15a041fab972
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1551399323399)/
                Budgets:
                  BudgetID: c1d195d4-92aa-4abd-867a-7ac2f9d60500
                  Type: TRACKING
                  Description: Daniels Northern Budget
                  UpdatedDateUTC: 2017-08-14 01:18:26.740000
                  Tracking:
                  - TrackingCategoryID: e94ba240-3edf-4ef3-8317-10147b968f94
                    Name: Region
                    TrackingOptionID: e94ba240-3edf-4ef3-8317-10147b968f94
                    Option: North
                  - TrackingCategoryID: d8580491-4167-4a81-9624-ad3bdd8e46ce
                    Name: Salesperson
                    TrackingOptionID: 9c24de87-a2b7-439d-a216-35d1af7bdec3
                    Option: Daniel
                  BudgetLines:
                  - AccountID: 9c24de87-a2b7-439d-a216-35d1af7bdec3
                    AccountCode: '200'
                    BudgetBalances:
                    - Period: 2019-08
                      Amount: '1000'
                      Notes: Sample note
                    - Period: 2019-09
                      Amount: '1050'
                      Notes: ''
                    - Period: 2019-10
                      Amount: '1102'
                      Notes: ''
                  - AccountID: 385f90ae-e798-4990-9b1c-db8eb8b735c2
                    AccountCode: '420'
                    BudgetBalances:
                    - Period: 2019-08
                      Amount: '500'
                      Notes: ''
                    - Period: 2019-09
                      Amount: '505'
                      Notes: Special Month
                    - Period: 2019-10
                      Amount: '510'
                      Notes: ''
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /Journals:
