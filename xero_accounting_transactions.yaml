          BankAccount:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
    BankTransfer:
      description: Represents the BankTransfer schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/bank-transfers/
      properties:
        FromBankAccount:
          description: The FromBankAccount value.
          allOf:
          - $ref: '#/components/schemas/Account'
          example:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
        ToBankAccount:
          description: The ToBankAccount value.
          allOf:
          - $ref: '#/components/schemas/Account'
          example:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
        Amount:
          description: amount of the transaction
          type: number
          format: double
          example: 1.0
        Date:
          description: The date of the Transfer YYYY-MM-DD
          type: string
          example: '2020-01-01'
        BankTransferID:
          description: The identifier of the Bank Transfer
          readOnly: true
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        CurrencyRate:
          description: The currency rate
          readOnly: true
          type: number
          format: double
          example: 1.0
        FromBankTransactionID:
          description: The Bank Transaction ID for the source account
          readOnly: true
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ToBankTransactionID:
          description: The Bank Transaction ID for the destination account
          readOnly: true
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        FromIsReconciled:
          description: The Bank Transaction boolean to show if it is reconciled for the source account
          type: boolean
          default: false
          example: false
        ToIsReconciled:
          description: The Bank Transaction boolean to show if it is reconciled for the destination account
          type: boolean
          default: false
          example: false
        Reference:
          description: Reference for the transactions.
          type: string
          example: Foobar
        HasAttachments:
          description: Boolean to indicate if a Bank Transfer has an attachment
          readOnly: true
          type: boolean
          default: false
          example: false
        CreatedDateUTC:
          description: UTC timestamp of creation date of bank transfer
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      required:
      - FromBankAccount
      - ToBankAccount
      - Amount
      type: object
      example:
        FromBankAccount:
          Code: 4400
          Name: Food Sales
          AccountID: 00000000-0000-0000-0000-000000000000
        ToBankAccount:
          Code: 4400
          Name: Food Sales
          AccountID: 00000000-0000-0000-0000-000000000000
        Amount: 1.0
    BankTransfers:
      description: Represents the BankTransfers schema used by the Accounting API.
      type: object
      properties:
        BankTransfers:
          description: The BankTransfers value.
          type: array
          items:
            $ref: '#/components/schemas/BankTransfer'
          example:
          - FromBankAccount:
              Code: 4400
              Name: Food Sales
              AccountID: 00000000-0000-0000-0000-000000000000
            ToBankAccount:
              Code: 4400
              Name: Food Sales
              AccountID: 00000000-0000-0000-0000-000000000000
            Amount: 1.0
      example:
        BankTransfers:
        - FromBankAccount:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
          ToBankAccount:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
          Amount: 1.0
    BatchPayment:
      description: Represents the BatchPayment schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/BatchPayments/
      properties:
        Account:
          description: The Account value.
          allOf:
          - $ref: '#/components/schemas/Account'
          example:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
        Reference:
          description: (NZ Only) Optional references for the batch payment transaction. It will also show with the batch payment
            transaction in the bank reconciliation Find & Match screen. Depending on your individual bank, the detail may
            also show on the bank statement you import into Xero.
          type: string
          maxLength: 255
          example: Foobar
        Particulars:
          description: (NZ Only) Optional references for the batch payment transaction. It will also show with the batch payment
            transaction in the bank reconciliation Find & Match screen. Depending on your individual bank, the detail may
            also show on the bank statement you import into Xero.
          type: string
          maxLength: 12
          example: example
        Code:
          description: (NZ Only) Optional references for the batch payment transaction. It will also show with the batch payment
            transaction in the bank reconciliation Find & Match screen. Depending on your individual bank, the detail may
            also show on the bank statement you import into Xero.
          type: string
          maxLength: 12
          example: 4400
        Details:
          description: (Non-NZ Only) These details are sent to the orgΓÇÖs bank as a reference for the batch payment transaction.
            They will also show with the batch payment transaction in the bank reconciliation Find & Match screen. Depending
            on your individual bank, the detail may also show on the bank statement imported into Xero. Maximum field length
            = 18
          type: string
          example: Hello World
        Narrative:
          description: (UK Only) Only shows on the statement line in Xero. Max length =18
          type: string
          maxLength: 18
          example: example
        BatchPaymentID:
          description: The Xero generated unique identifier for the bank transaction (read-only)
          readOnly: true
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        DateString:
          description: Date the payment is being made (YYYY-MM-DD) e.g. 2009-09-06
          type: string
          example: '2020-01-01'
        Date:
          description: Date the payment is being made (YYYY-MM-DD) e.g. 2009-09-06
          type: string
          example: '2020-01-01'
        Amount:
          description: The amount of the payment. Must be less than or equal to the outstanding amount owing on the invoice
            e.g. 200.00
          type: number
          format: double
          example: 1.0
        Payments:
          description: An array of payments
          type: array
          items:
            $ref: '#/components/schemas/Payment'
          example:
          - Invoice:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              LineItems:
              - LineItemID: 00000000-0000-0000-0000-000000000000
                Description: My business checking account
                Quantity: 1.0
            CreditNote:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              Date: '2020-01-01'
            Prepayment:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              Date: '2020-01-01'
        Type:
          description: PAYBATCH for bill payments or RECBATCH for sales invoice payments (read-only)
          readOnly: true
          type: string
          enum:
          - PAYBATCH
          - RECBATCH
          example: ValidationException
        Status:
          description: AUTHORISED or DELETED (read-only). New batch payments will have a status of AUTHORISED. It is not possible
            to delete batch payments via the API.
          readOnly: true
          type: string
          enum:
          - AUTHORISED
          - DELETED
          example: AUTHORISED
        TotalAmount:
          description: The total of the payments that make up the batch (read-only)
          type: number
          format: double
          readOnly: true
          example: 1.0
        UpdatedDateUTC:
          description: UTC timestamp of last update to the payment
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        IsReconciled:
          description: Booelan that tells you if the batch payment has been reconciled (read-only)
          readOnly: true
          type: boolean
          example: false
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      type: object
      example:
        Account:
          Code: 4400
          Name: Food Sales
          AccountID: 00000000-0000-0000-0000-000000000000
        Reference: Foobar
        Particulars: example
    BatchPaymentDelete:
      description: Represents the BatchPaymentDelete schema used by the Accounting API.
