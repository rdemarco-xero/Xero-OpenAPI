      externalDocs:
        url: http://developer.xero.com/documentation/api/invoice/
      properties:
        Status:
          description: Need at least one field to create an empty JSON payload
          type: string
          example: ACTIVE
      type: object
      example:
        Status: ACTIVE
    SalesTrackingCategory:
      description: Represents the SalesTrackingCategory schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/tracking-categories/
      properties:
        TrackingCategoryName:
          description: The default sales tracking category name for contacts
          type: string
          example: Example Name
        TrackingOptionName:
          description: The default purchase tracking category name for contacts
          type: string
          example: Example Name
      type: object
      example:
        TrackingCategoryName: Example Name
        TrackingOptionName: Example Name
    Schedule:
      description: Represents the Schedule schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/repeating-invoices/
      properties:
        Period:
          description: Integer used with the unit e.g. 1 (every 1 week), 2 (every 2 months)
          type: integer
          example: 1
        Unit:
          description: One of the following - WEEKLY or MONTHLY
          type: string
          enum:
          - WEEKLY
          - MONTHLY
          example: WEEKLY
        DueDate:
          description: Integer used with due date type e.g 20 (of following month), 31 (of current month)
          type: integer
          example: 1
        DueDateType:
          description: the payment terms
          type: string
          enum:
          - DAYSAFTERBILLDATE
          - DAYSAFTERBILLMONTH
          - DAYSAFTERINVOICEDATE
          - DAYSAFTERINVOICEMONTH
          - OFCURRENTMONTH
          - OFFOLLOWINGMONTH
          example: DAYSAFTERBILLDATE
        StartDate:
          description: Date the first invoice of the current version of the repeating schedule was generated (changes when
            repeating invoice is edited)
          type: string
          example: '2020-01-01'
        NextScheduledDate:
          description: The calendar date of the next invoice in the schedule to be generated
          type: string
          example: '2020-01-01'
        EndDate:
          description: Invoice end date ΓÇô only returned if the template has an end date set
          type: string
          example: '2020-01-01'
      type: object
      example:
        Period: 1
        Unit: WEEKLY
        DueDate: 1
    TaxBreakdownComponent:
      description: Returns the user identified by the supplied user ID in a Users response payload.
      properties:
        TaxComponentId:
          description: The unique ID number of this component
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Type:
          description: The type of the jurisdiction
          type: string
          enum:
          - SYSGST/USCOUNTRY
          - SYSGST/USSTATE
          - SYSGST/USCOUNTY
          - SYSGST/USCITY
          - SYSGST/USSPECIAL
          example: ValidationException
        Name:
          description: The name of the jurisdiction
          type: string
          example: Food Sales
        TaxPercentage:
          description: The percentage of the tax
          type: number
          example: 1.0
        TaxAmount:
          description: The amount of the tax
          type: number
          example: 0.0
        TaxableAmount:
          description: The amount that is taxable
          type: number
          example: 1.0
        NonTaxableAmount:
          description: The amount that is not taxable
          type: number
          example: 1.0
        ExemptAmount:
          description: The amount that is exempt
          type: number
          example: 1.0
        StateAssignedNo:
          description: The state assigned number of the jurisdiction
          type: string
          example: example
        JurisdictionRegion:
          description: Name identifying the region within the country
          type: string
          example: false
      type: object
      example:
        TaxComponentId: 00000000-0000-0000-0000-000000000000
        Type: ValidationException
        Name: Food Sales
    TrackingCategory:
      description: Represents the TrackingCategory schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/tracking-categories/
      properties:
        TrackingCategoryID:
          description: The Xero identifier for a tracking category e.g. 297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        TrackingOptionID:
          description: The Xero identifier for a tracking option e.g. dc54c220-0140-495a-b925-3246adc0075f
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Name:
