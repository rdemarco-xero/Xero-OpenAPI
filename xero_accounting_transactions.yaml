  /RepeatingInvoices/{RepeatingInvoiceID}/History:
    summary: Manage history records for a specific repeating invoice
    description: Manage history records for a specific repeating invoice.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.transactions
        - accounting.transactions.read
      tags:
      - Accounting
      - Transactions
      operationId: getRepeatingInvoiceHistory
      summary: Get a repeating invoice by repeating invoice ID
      description: Returns the repeating invoice and its nested details identified by the supplied repeating invoice ID in
        a Error response payload.
      parameters:
      - $ref: '#/components/parameters/RepeatingInvoiceID'
      responses:
        '200':
          $ref: '#/components/responses/HistoryRetrieved'
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
    put:
      security:
      - OAuth2:
        - accounting.transactions
      tags:
      - Accounting
      - Transactions
      operationId: createRepeatingInvoiceHistory
      summary: Create a history record for a repeating invoice
      description: Appends a history note to the specified repeating invoice and returns the resulting history response in
        the history response payload.
      parameters:
      - $ref: '#/components/parameters/idempotencyKey'
      - $ref: '#/components/parameters/RepeatingInvoiceID'
      responses:
        '200':
          $ref: '#/components/responses/HistoryRecordCreated'
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        $ref: '#/components/requestBodies/historyRecords'
