          description: The Account value.
          allOf:
          - $ref: '#/components/schemas/Account'
          example:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
        Code:
          description: Code of account you are using to make the payment e.g. 001 (note- not all accounts have a code value)
          type: string
          example: 4400
        Date:
          description: Date the payment is being made (YYYY-MM-DD) e.g. 2009-09-06
          type: string
          example: '2020-01-01'
        CurrencyRate:
          description: Exchange rate when payment is received. Only used for non base currency invoices and credit notes e.g.
            0.7500
          type: number
          format: double
          example: 1.0
        Amount:
          description: The amount of the payment. Must be less than or equal to the outstanding amount owing on the invoice
            e.g. 200.00
          type: number
          format: double
          example: 1.0
        BankAmount:
          description: The amount of the payment in the currency of the bank account.
          type: number
          format: double
          example: 1.0
        Reference:
