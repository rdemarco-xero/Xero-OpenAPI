                ContactNumber: '12345'
              Date: '2020-01-01'
        Prepayments:
          description: See Prepayments
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Prepayment'
          example:
          - Type: ValidationException
            Contact:
              ContactID: 00000000-0000-0000-0000-000000000000
              MergedToContactID: 00000000-0000-0000-0000-000000000000
              ContactNumber: '12345'
            Date: '2020-01-01'
        Overpayments:
          description: See Overpayments
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Overpayment'
          example:
          - Type: ValidationException
            Contact:
              ContactID: 00000000-0000-0000-0000-000000000000
              MergedToContactID: 00000000-0000-0000-0000-000000000000
              ContactNumber: '12345'
            Date: '2020-01-01'
        AmountDue:
          description: Amount remaining to be paid on invoice
          readOnly: true
          type: number
          format: double
          example: 1.0
        AmountPaid:
          description: Sum of payments received for invoice
          readOnly: true
          type: number
          format: double
          example: 00000000-0000-0000-0000-000000000000
        FullyPaidOnDate:
          description: The date the invoice was fully paid. Only returned on fully paid invoices
          readOnly: true
          type: string
          example: '2020-01-01'
        AmountCredited:
          description: Sum of all credit notes, over-payments and pre-payments applied to invoice
          readOnly: true
          type: number
          format: double
          example: 1.0
        UpdatedDateUTC:
          description: Last modified date UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        CreditNotes:
          description: Details of credit notes that have been applied to an invoice
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/CreditNote'
          example:
          - Type: ValidationException
            Contact:
              ContactID: 00000000-0000-0000-0000-000000000000
              MergedToContactID: 00000000-0000-0000-0000-000000000000
              ContactNumber: '12345'
            Date: '2020-01-01'
        Attachments:
          description: Displays array of attachments from the API
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          example:
          - AttachmentID: 00000000-0000-0000-0000-000000000000
            FileName: xero-dev.jpg
            Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        HasErrors:
          description: A boolean to indicate if a invoice has an validation errors
          type: boolean
          default: false
          example: false
        StatusAttributeString:
          description: A string to indicate if a invoice status
          type: string
          example: ERROR
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        Warnings:
          description: Displays array of warning messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        InvoiceAddresses:
          description: An array of addresses used to auto calculate sales tax
          type: array
          items:
            $ref: '#/components/schemas/InvoiceAddress'
          example:
          - InvoiceAddressType: FROM
            AddressLine1: example
            AddressLine2: example
      type: object
      example:
        Type: ValidationException
        Contact:
          ContactID: 00000000-0000-0000-0000-000000000000
          MergedToContactID: 00000000-0000-0000-0000-000000000000
          ContactNumber: '12345'
        LineItems:
        - LineItemID: 00000000-0000-0000-0000-000000000000
          Description: My business checking account
          Quantity: 1.0
    InvoiceAddress:
      description: Represents the InvoiceAddress schema used by the Accounting API.
      properties:
        InvoiceAddressType:
          description: Indicates whether the address is defined as origin (FROM) or destination (TO)
          type: string
          enum:
          - FROM
          - TO
          example: FROM
        AddressLine1:
          description: First line of a physical address
          type: string
          example: example
        AddressLine2:
          description: Second line of a physical address
          type: string
          example: example
        AddressLine3:
          description: Third line of a physical address
          type: string
          example: example
        AddressLine4:
          description: Fourth line of a physical address
          type: string
          example: example
        City:
          description: City of a physical address
          type: string
          example: example
        Region:
          description: Region or state of a physical address
          type: string
          example: example
        PostalCode:
          description: Postal code of a physical address
          type: string
          example: '10001'
        Country:
          description: Country of a physical address
          type: string
          example: US
      type: object
      example:
        InvoiceAddressType: FROM
        AddressLine1: example
        AddressLine2: example
    Invoices:
      description: Represents the Invoices schema used by the Accounting API.
      type: object
      properties:
        pagination:
          description: The pagination value.
          allOf:
          - $ref: '#/components/schemas/Pagination'
          example:
            page: 1
            pageSize: 100
            pageCount: 1
        Warnings:
          description: Displays array of warning messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        Invoices:
          description: The Invoices value.
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
          example:
          - Type: ValidationException
            Contact:
              ContactID: 00000000-0000-0000-0000-000000000000
              MergedToContactID: 00000000-0000-0000-0000-000000000000
              ContactNumber: '12345'
            LineItems:
            - LineItemID: 00000000-0000-0000-0000-000000000000
              Description: My business checking account
              Quantity: 1.0
      example:
        pagination:
          page: 1
          pageSize: 100
          pageCount: 1
        Warnings:
        - Message: One or more validation errors occurred.
        Invoices:
        - Type: ValidationException
          Contact:
            ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
          LineItems:
          - LineItemID: 00000000-0000-0000-0000-000000000000
            Description: My business checking account
            Quantity: 1.0
    LineAmountTypes:
      description: Line amounts are exclusive of tax by default if you donΓÇÖt specify this element. See Line Amount Types
      type: string
      enum:
      - Exclusive
      - Inclusive
      - NoTax
      example: Exclusive
    LineItem:
      description: Represents the LineItem schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/invoices#post
      properties:
        LineItemID:
          description: LineItem unique ID
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Description:
          description: Description needs to be at least 1 char long. A line item with just a description (i.e no unit amount
            or quantity) can be created by specifying just a <Description> element that contains at least 1 character
          type: string
          example: My business checking account
        Quantity:
          description: LineItem Quantity
          type: number
          format: double
          example: 1.0
        UnitAmount:
          description: LineItem Unit Amount
          type: number
          format: double
          example: 1.0
        ItemCode:
          description: See Items
          type: string
          example: ABC-123
        AccountCode:
          description: See Accounts
          type: string
          example: 090
        AccountID:
          description: The associated account ID related to this line item
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        TaxType:
          description: The tax type from TaxRates
          type: string
          example: INPUT2
        TaxAmount:
          description: The tax amount is auto calculated as a percentage of the line amount (see below) based on the tax rate.
            This value can be overriden if the calculated <TaxAmount> is not correct.
          type: number
          format: double
          example: 0.0
        Item:
          description: The Item value.
          allOf:
          - $ref: '#/components/schemas/LineItemItem'
          example:
            Code: 4400
            Name: Food Sales
            ItemID: 00000000-0000-0000-0000-000000000000
        LineAmount:
          description: If you wish to omit either the Quantity or UnitAmount you can provide a LineAmount and Xero will calculate
            the missing amount for you. The line amount reflects the discounted price if either a DiscountRate or DiscountAmount
            has been used i.e. LineAmount = Quantity * Unit Amount * ((100 - DiscountRate)/100) or LineAmount = (Quantity
            * UnitAmount) - DiscountAmount
          type: number
          format: double
          example: -2569.0
        Tracking:
          description: Optional Tracking Category ΓÇô see Tracking.  Any LineItem can have a  maximum of 2 <TrackingCategory>
            elements.
          type: array
          items:
            $ref: '#/components/schemas/LineItemTracking'
          example:
          - TrackingCategoryID: 00000000-0000-0000-0000-000000000000
            TrackingOptionID: 00000000-0000-0000-0000-000000000000
            Name: Region
        DiscountRate:
          description: Percentage discount being applied to a line item (only supported on  ACCREC invoices ΓÇô ACC PAY invoices
            and credit notes in Xero do not support discounts
          type: number
          format: double
          example: 1.0
        DiscountAmount:
          description: Discount amount being applied to a line item. Only supported on ACCREC invoices and quotes. ACCPAY
            invoices and credit notes in Xero do not support discounts.
          type: number
          format: double
          example: 1.0
        RepeatingInvoiceID:
          description: The Xero identifier for a Repeating Invoice
          example: 00000000-0000-0000-0000-000000000000
          type: string
          format: uuid
        Taxability:
          description: The type of taxability
          type: string
          enum:
          - TAXABLE
          - NON_TAXABLE
          - EXEMPT
          - PART_TAXABLE
          - NOT_APPLICABLE
          example: TAXABLE
        SalesTaxCodeId:
          description: The ID of the sales tax code
          type: number
          example: 00000000-0000-0000-0000-000000000000
        TaxBreakdown:
          description: An array of tax components defined for this line item
          type: array
          items:
            $ref: '#/components/schemas/TaxBreakdownComponent'
          example:
          - TaxComponentId: 00000000-0000-0000-0000-000000000000
            Type: ValidationException
            Name: Food Sales
      type: object
      example:
        LineItemID: 00000000-0000-0000-0000-000000000000
        Description: My business checking account
        Quantity: 1.0
    LineItemItem:
      description: Represents the LineItemItem schema used by the Accounting API.
      properties:
        Code:
          description: User defined item code (max length = 30)
          maxLength: 30
          type: string
          example: 4400
        Name:
          description: The name of the item (max length = 50)
          maxLength: 50
          type: string
          example: Food Sales
        ItemID:
          description: The Xero identifier for an Item
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      example:
        Code: 4400
        Name: Food Sales
        ItemID: 00000000-0000-0000-0000-000000000000
    LineItemTracking:
      description: Represents the LineItemTracking schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/invoices#post
      properties:
        TrackingCategoryID:
          description: The Xero identifier for a tracking category
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        TrackingOptionID:
          description: The Xero identifier for a tracking category option
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Name:
          description: The name of the tracking category
          maxLength: 100
          type: string
          example: Region
        Option:
          description: See Tracking Options
          type: string
          example: North
      type: object
      example:
        TrackingCategoryID: 00000000-0000-0000-0000-000000000000
        TrackingOptionID: 00000000-0000-0000-0000-000000000000
        Name: Region
    LinkedTransaction:
      description: Represents the LinkedTransaction schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/linked-transactions/
      properties:
        SourceTransactionID:
          description: Filter by the SourceTransactionID. Get all the linked transactions created from a particular ACCPAY
            invoice
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        SourceLineItemID:
          description: The line item identifier from the source transaction.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ContactID:
          description: Filter by the combination of ContactID and Status. Get all the linked transactions that have been assigned
            to a particular customer and have a particular status e.g. GET /LinkedTransactions?ContactID=4bb34b03-3378-4bb2-a0ed-6345abf3224e&Status=APPROVED.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        TargetTransactionID:
          description: Filter by the TargetTransactionID. Get all the linked transactions  allocated to a particular ACCREC
            invoice
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        TargetLineItemID:
          description: The line item identifier from the target transaction. It is possible  to link multiple billable expenses
            to the same TargetLineItemID.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        LinkedTransactionID:
          description: The Xero identifier for an Linked Transaction e.g./LinkedTransactions/297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Status:
          description: Filter by the combination of ContactID and Status. Get all the linked transactions that have been assigned
            to a particular customer and have a particular status e.g. GET /LinkedTransactions?ContactID=4bb34b03-3378-4bb2-a0ed-6345abf3224e&Status=APPROVED.
          type: string
          enum:
          - APPROVED
          - DRAFT
          - ONDRAFT
          - BILLED
          - VOIDED
          example: APPROVED
        Type:
          description: This will always be BILLABLEEXPENSE. More types may be added in future.
          type: string
          enum:
          - BILLABLEEXPENSE
          example: ValidationException
        UpdatedDateUTC:
          description: The last modified date in UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        SourceTransactionTypeCode:
          description: The Type of the source tranasction. This will be ACCPAY if the linked transaction was created from
            an invoice and SPEND if it was created from a bank transaction.
          type: string
          enum:
          - ACCPAY
          - SPEND
          example: ACCPAY
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      type: object
      example:
        SourceTransactionID: 00000000-0000-0000-0000-000000000000
        SourceLineItemID: 00000000-0000-0000-0000-000000000000
        ContactID: 00000000-0000-0000-0000-000000000000
    LinkedTransactions:
      description: Represents the LinkedTransactions schema used by the Accounting API.
      type: object
      properties:
        LinkedTransactions:
          description: The LinkedTransactions value.
          type: array
          items:
            $ref: '#/components/schemas/LinkedTransaction'
          example:
          - SourceTransactionID: 00000000-0000-0000-0000-000000000000
            SourceLineItemID: 00000000-0000-0000-0000-000000000000
            ContactID: 00000000-0000-0000-0000-000000000000
      example:
        LinkedTransactions:
        - SourceTransactionID: 00000000-0000-0000-0000-000000000000
          SourceLineItemID: 00000000-0000-0000-0000-000000000000
          ContactID: 00000000-0000-0000-0000-000000000000
    ManualJournal:
      description: Represents the ManualJournal schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/manual-journals/
      properties:
        Narration:
          description: Description of journal being posted
          type: string
          example: example
        JournalLines:
          description: See JournalLines
          type: array
          items:
            $ref: '#/components/schemas/ManualJournalLine'
          example:
          - LineAmount: -2569.0
            AccountCode: 720
            AccountID: 00000000-0000-0000-0000-000000000000
        Date:
          description: Date journal was posted ΓÇô YYYY-MM-DD
          type: string
          example: '2020-01-01'
        LineAmountTypes:
          description: The LineAmountTypes value.
          allOf:
          - $ref: '#/components/schemas/LineAmountTypes'
          type: string
          example: Exclusive
        Status:
          description: See Manual Journal Status Codes
          type: string
          enum:
          - DRAFT
          - POSTED
          - DELETED
          - VOIDED
          - ARCHIVED
          example: DRAFT
        Url:
          description: Url link to a source document ΓÇô shown as ΓÇ£Go to [appName]ΓÇ¥ in the Xero app
          type: string
          example: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        ShowOnCashBasisReports:
          description: Boolean ΓÇô default is true if not specified
          type: boolean
          example: false
        HasAttachments:
          description: Boolean to indicate if a manual journal has an attachment
          readOnly: true
          type: boolean
          default: false
          example: false
        UpdatedDateUTC:
          description: Last modified date UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        ManualJournalID:
          description: The Xero identifier for a Manual Journal
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        StatusAttributeString:
          description: A string to indicate if a invoice status
          type: string
          example: ERROR
        Warnings:
          description: Displays array of warning messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        Attachments:
          description: Displays array of attachments from the API
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          example:
          - AttachmentID: 00000000-0000-0000-0000-000000000000
            FileName: xero-dev.jpg
            Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
      required:
      - Narration
      type: object
      example:
        Narration: example
        JournalLines:
        - LineAmount: -2569.0
          AccountCode: 720
          AccountID: 00000000-0000-0000-0000-000000000000
        Date: '2020-01-01'
    ManualJournalLine:
      description: Represents the ManualJournalLine schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/manual-journals/
      properties:
        LineAmount:
          description: total for line. Debits are positive, credits are negative value
          type: number
          format: double
          example: -2569.0
        AccountCode:
          description: See Accounts
          type: string
          example: 720
        AccountID:
          description: See Accounts
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Description:
          description: Description for journal line
          type: string
          example: Coded incorrectly Office Equipment should be Computer Equipment
        TaxType:
          description: The tax type from TaxRates
          type: string
          example: INPUT2
        Tracking:
          description: Optional Tracking Category ΓÇô see Tracking. Any JournalLine can have a maximum of 2 <TrackingCategory>
            elements.
          type: array
          items:
            $ref: '#/components/schemas/TrackingCategory'
          example:
          - TrackingCategoryID: 00000000-0000-0000-0000-000000000000
            TrackingOptionID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
        TaxAmount:
          description: The calculated tax amount based on the TaxType and LineAmount
          type: number
          format: double
          example: 0.0
        IsBlank:
          description: is the line blank
          type: boolean
          example: false
      type: object
      example:
        LineAmount: -2569.0
        AccountCode: 720
        AccountID: 00000000-0000-0000-0000-000000000000
    ManualJournals:
      description: Represents the ManualJournals schema used by the Accounting API.
      type: object
      properties:
        pagination:
          description: The pagination value.
          allOf:
          - $ref: '#/components/schemas/Pagination'
          example:
            page: 1
            pageSize: 100
            pageCount: 1
        Warnings:
          description: Displays array of warning messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        ManualJournals:
          description: The ManualJournals value.
          type: array
          items:
            $ref: '#/components/schemas/ManualJournal'
          example:
          - Narration: example
            JournalLines:
            - LineAmount: -2569.0
              AccountCode: 720
              AccountID: 00000000-0000-0000-0000-000000000000
            Date: '2020-01-01'
      example:
        pagination:
          page: 1
          pageSize: 100
          pageCount: 1
        Warnings:
        - Message: One or more validation errors occurred.
        ManualJournals:
        - Narration: example
          JournalLines:
          - LineAmount: -2569.0
            AccountCode: 720
            AccountID: 00000000-0000-0000-0000-000000000000
          Date: '2020-01-01'
    OnlineInvoice:
      description: Represents the OnlineInvoice schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/invoices/
      properties:
        OnlineInvoiceUrl:
          description: the URL to an online invoice
          type: string
          example: https://api.xero.com/example
      type: object
      example:
        OnlineInvoiceUrl: https://api.xero.com/example
    OnlineInvoices:
      description: Represents the OnlineInvoices schema used by the Accounting API.
      type: object
      properties:
        OnlineInvoices:
          description: The OnlineInvoices value.
          type: array
          items:
            $ref: '#/components/schemas/OnlineInvoice'
          example:
          - OnlineInvoiceUrl: https://api.xero.com/example
      example:
        OnlineInvoices:
        - OnlineInvoiceUrl: https://api.xero.com/example
    Overpayment:
      description: Represents the Overpayment schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/overpayments/
      properties:
        Type:
          description: See Overpayment Types
          type: string
          enum:
          - RECEIVE-OVERPAYMENT
          - SPEND-OVERPAYMENT
          - AROVERPAYMENT
          example: ValidationException
        Contact:
          description: The Contact value.
          allOf:
          - $ref: '#/components/schemas/Contact'
          example:
            ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
        Date:
          description: The date the overpayment is created YYYY-MM-DD
          type: string
          example: '2020-01-01'
        Status:
          description: See Overpayment Status Codes
          type: string
          enum:
          - AUTHORISED
          - PAID
          - VOIDED
          example: AUTHORISED
        LineAmountTypes:
          description: The LineAmountTypes value.
          allOf:
          - $ref: '#/components/schemas/LineAmountTypes'
          type: string
          example: Exclusive
        LineItems:
          description: See Overpayment Line Items
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
          example:
          - LineItemID: 00000000-0000-0000-0000-000000000000
            Description: My business checking account
            Quantity: 1.0
        SubTotal:
          description: The subtotal of the overpayment excluding taxes
          type: number
          format: double
          example: 1.0
        TotalTax:
          description: The total tax on the overpayment
          type: number
          format: double
          example: 1.0
        Total:
          description: The total of the overpayment (subtotal + total tax)
          type: number
          format: double
          example: 1.0
        UpdatedDateUTC:
          description: UTC timestamp of last update to the overpayment
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        CurrencyCode:
          description: The CurrencyCode value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        OverpaymentID:
          description: Xero generated unique identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        CurrencyRate:
          description: The currency rate for a multicurrency overpayment. If no rate is specified, the XE.com day rate is
            used
          type: number
          format: double
          example: 1.0
        RemainingCredit:
          description: The remaining credit balance on the overpayment
          type: number
          format: double
          example: 1.0
        Allocations:
          description: See Allocations
          type: array
          items:
            $ref: '#/components/schemas/Allocation'
          example:
          - Amount: 1.0
            Invoice:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              LineItems:
              - LineItemID: 00000000-0000-0000-0000-000000000000
                Description: My business checking account
                Quantity: 1.0
            Date: '2020-01-01'
            AllocationID: 00000000-0000-0000-0000-000000000000
        AppliedAmount:
          description: The amount of applied to an invoice
          type: number
          format: double
          example: 2.0
        Payments:
          description: See Payments
          type: array
          items:
            $ref: '#/components/schemas/Payment'
          example:
          - Invoice:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              LineItems:
