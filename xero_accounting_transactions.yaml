    get:
      security:
      - OAuth2:
        - accounting.transactions
        - accounting.transactions.read
      tags:
      - Accounting
      - Transactions
      operationId: getBankTransactions
      summary: List spent and received money transactions
      description: Returns the spent and received money transactions available to the organisation in a Bank Transactions
        response payload. Use the available filtering, ordering, paging, or modified-since parameters when the endpoint exposes
        them.
      parameters:
      - $ref: '#/components/parameters/ifModifiedSince'
      - in: query
        name: where
        description: Filter by an any element
        example: Status=="AUTHORISED"
        schema:
          type: string
          example: example
      - in: query
        name: order
        description: Order by an any element
        example: Type ASC
        schema:
          type: string
          example: example
      - in: query
        name: page
        description: Up to 100 bank transactions will be returned in a single API call with line items details
        example: 1
        schema:
          type: integer
          example: 1
      - $ref: '#/components/parameters/unitdp'
      - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Success - return response of type BankTransactions array with 0 to n BankTransaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankTransactions'
              example:
                Id: 18e7e80c-5dca-4a57-974e-8b572cc5efe8
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1551212901659)/
                pagination:
