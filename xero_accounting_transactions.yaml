  schemas:
    Account:
      description: Represents the Account schema used by the Accounting API.
      type: object
      externalDocs:
        url: http://developer.xero.com/documentation/api/accounts/
      properties:
        Code:
          description: Customer defined alpha numeric account code e.g 200 or SALES (max length = 10)
          type: string
          example: 4400
        Name:
          description: Name of account (max length = 150)
          maxLength: 150
          type: string
          example: Food Sales
        AccountID:
          description: The Xero identifier for an account ΓÇô specified as a string following  the endpoint name   e.g. /297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Type:
          description: The Type value.
          allOf:
          - $ref: '#/components/schemas/AccountType'
          type: string
          example: BANK
        BankAccountNumber:
          description: For bank accounts only (Account Type BANK)
          type: string
          example: 123-456-1111111
        Status:
          description: Accounts with a status of ACTIVE can be updated to ARCHIVED. See Account Status Codes
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
          - DELETED
          example: ACTIVE
        Description:
          description: Description of the Account. Valid for all types of accounts except bank accounts (max length = 4000)
          type: string
          example: My business checking account
        BankAccountType:
          description: For bank accounts only. See Bank Account types
          type: string
          enum:
          - BANK
          - CREDITCARD
          - PAYPAL
          - NONE
          - ''
          example: BANK
        CurrencyCode:
          description: The CurrencyCode value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        TaxType:
          description: The tax type from taxRates
          type: string
          example: INPUT2
        EnablePaymentsToAccount:
          description: Boolean ΓÇô describes whether account can have payments applied to it
          type: boolean
          example: false
        ShowInExpenseClaims:
          description: Boolean ΓÇô describes whether account code is available for use with expense claims
          type: boolean
          example: false
        Class:
          description: See Account Class Types
          readOnly: true
          type: string
          enum:
          - ASSET
          - EQUITY
          - EXPENSE
          - LIABILITY
          - REVENUE
          example: ASSET
        SystemAccount:
          description: If this is a system account then this element is returned. See System Account types. Note that non-system
            accounts may have this element set as either ΓÇ£ΓÇ¥ or null.
          readOnly: true
          type: string
          enum:
          - DEBTORS
          - CREDITORS
          - BANKCURRENCYGAIN
          - GST
          - GSTONIMPORTS
          - HISTORICAL
          - REALISEDCURRENCYGAIN
          - RETAINEDEARNINGS
          - ROUNDING
          - TRACKINGTRANSFERS
          - UNPAIDEXPCLM
          - UNREALISEDCURRENCYGAIN
          - WAGEPAYABLES
          - CISASSETS
          - CISASSET
          - CISLABOUR
          - CISLABOUREXPENSE
          - CISLABOURINCOME
          - CISLIABILITY
          - CISMATERIALS
          - ''
          example: DEBTORS
        ReportingCode:
          description: Shown if set
          type: string
          example: ABC-123
        ReportingCodeName:
          description: Shown if set
          readOnly: true
          type: string
          example: Example Name
        HasAttachments:
          description: boolean to indicate if an account has an attachment (read only)
          readOnly: true
          type: boolean
          default: false
          example: false
        UpdatedDateUTC:
          description: Last modified date UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        AddToWatchlist:
          description: Boolean ΓÇô describes whether the account is shown in the watchlist widget on the dashboard
          type: boolean
          example: false
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      example:
        Code: 4400
        Name: Food Sales
        AccountID: 00000000-0000-0000-0000-000000000000
    AccountType:
      description: See Account Types
      type: string
      enum:
      - BANK
      - CURRENT
      - CURRLIAB
      - DEPRECIATN
      - DIRECTCOSTS
      - EQUITY
      - EXPENSE
      - FIXED
      - INVENTORY
      - LIABILITY
      - NONCURRENT
      - OTHERINCOME
      - OVERHEADS
      - PREPAYMENT
      - REVENUE
      - SALES
      - TERMLIAB
      - PAYG
      example: BANK
