  /BatchPayments/{BatchPaymentID}/History:
    summary: Manage history records for a specific batch payment
    description: Manage history records for a specific batch payment.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.transactions
        - accounting.transactions.read
      tags:
      - Accounting
      - Transactions
      operationId: getBatchPaymentHistory
      summary: Get a batch payment by batch payment ID
      description: Returns the batch payment and its nested details identified by the supplied batch payment ID in a History
        Records response payload.
      parameters:
      - $ref: '#/components/parameters/BatchPaymentID'
      responses:
        '200':
          description: Success - return response of HistoryRecords array of 0 to N HistoryRecord
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryRecords'
              example:
                Id: c58e2f9c-baad-42a4-8bb7-f32b6f88fa04
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550898452503)/
                HistoryRecords:
                - Changes: Approved
                  DateUTCString: 2017-11-28 18:29:52
                  DateUTC: /Date(1511893792813+0000)/
                  User: Buzz Lightyear
                  Details: ''
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
    put:
      security:
      - OAuth2:
        - accounting.transactions
      tags:
      - Accounting
      - Transactions
      operationId: createBatchPaymentHistoryRecord
      summary: Create a history record for a batch payment
      description: Appends a history note to the specified batch payment and returns the resulting history response in a History
        Records response payload.
      parameters:
      - $ref: '#/components/parameters/idempotencyKey'
      - $ref: '#/components/parameters/BatchPaymentID'
      responses:
        '200':
          description: Success - return response of type HistoryRecords array of HistoryRecord objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryRecords'
              example:
                Id: d7525479-3392-44c0-bb37-ff4a0b5df5bd
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550899400362)/
                HistoryRecords:
                - DateUTCString: 2019-02-23 05:23:20
                  DateUTC: /Date(1550899400362)/
                  Details: Hello World
                  ValidationErrors: []
        '400':
