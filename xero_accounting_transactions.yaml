        BankAccountName:
          description: Name of bank for use with Batch Payments
          type: string
          example: ACME Bank
        Details:
          description: (Non-NZ Only) These details are sent to the orgΓÇÖs bank as a reference for the batch payment transaction.
            They will also show with the batch payment transaction in the bank reconciliation Find & Match screen. Depending
            on your individual bank, the detail may also show on the bank statement imported into Xero. Maximum field length
            = 18
          type: string
          example: Hello World
        Code:
          description: (NZ Only) Optional references for the batch payment transaction. It will also show with the batch payment
            transaction in the bank reconciliation Find & Match screen. Depending on your individual bank, the detail may
            also show on the bank statement you import into Xero.
          type: string
          maxLength: 12
          example: ABC
        Reference:
          description: (NZ Only) Optional references for the batch payment transaction. It will also show with the batch payment
            transaction in the bank reconciliation Find & Match screen. Depending on your individual bank, the detail may
            also show on the bank statement you import into Xero.
          type: string
          maxLength: 12
          example: Foobar
      example:
        BankAccountNumber: 123-456-1111111
        BankAccountName: ACME Bank
        Details: Hello World
    BatchPayments:
      description: Represents the BatchPayments schema used by the Accounting API.
      type: object
      properties:
        BatchPayments:
          description: The BatchPayments value.
          type: array
          items:
            $ref: '#/components/schemas/BatchPayment'
          example:
          - Account:
              Code: 4400
              Name: Food Sales
              AccountID: 00000000-0000-0000-0000-000000000000
            Reference: Foobar
            Particulars: example
      example:
        BatchPayments:
        - Account:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
          Reference: Foobar
          Particulars: example
    Bill:
      description: Represents the Bill schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/organisation/
      properties:
        Day:
          description: Day of Month (0-31)
          type: integer
          example: 1
        Type:
          description: The Type value.
          allOf:
          - $ref: '#/components/schemas/PaymentTermType'
          example: DAYSAFTERBILLDATE
      type: object
      example:
        Day: 1
