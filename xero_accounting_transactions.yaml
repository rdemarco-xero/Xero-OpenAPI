openapi: 3.0.0
info:
  title: Xero Accounting API
  description: The Xero Accounting API exposes accounting resources for working with contacts, transactions, reports, settings,
    and related organisation data.
  version: 12.0.0
  termsOfService: https://developer.xero.com/xero-developer-platform-terms-conditions/
  contact:
    name: Xero Platform Team
    email: api@xero.com
    url: https://developer.xero.com
servers:
- description: The Xero Accounting API exposes accounting and related functions of the main Xero application and can be used
    for a variety of purposes such as creating transactions like invoices and credit notes, right through to extracting accounting
    data via our reports endpoint.
  url: https://api.xero.com/api.xro/2.0
tags:
- name: Accounting
  description: Core accounting resources including accounts, invoices, contacts, payments, and reports.
- name: Transactions
  description: Transactional accounting resources including invoices, payments, credit notes, and related money movement endpoints.
paths:
  /BatchPayments:
    summary: Manage batch payments
    description: Manage batch payments.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    post:
      security:
      - OAuth2:
        - accounting.transactions
      tags:
      - Accounting
      - Transactions
      operationId: deleteBatchPayment
      summary: Update batch payments in bulk
      description: Updates the supplied batch payments and returns the persisted resources in a Batch Payments response payload.
      parameters:
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Success - return response of type BatchPayments array for updated BatchPayment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchPayments'
              example:
                Id: ee23328c-4a8b-4ee7-8fb6-9796ffab9cb0
                Status: OK
                ProviderName: provider-name
                DateTimeUTC: /Date(1583945852489)/
                BatchPayments:
                - Account:
                    AccountID: efb6e3a4-3156-4cee-bfe1-a282a3cc1d8f
                    CurrencyCode: NZD
                  BatchPaymentID: b649632e-2782-4c74-95a5-d994d7140ed9
                  DateString: 2022-08-01 00:00:00
                  Date: /Date(1659312000000+0000)/
                  Payments: []
                  Type: PAYBATCH
                  Status: DELETED
                  TotalAmount: 18.0
                  UpdatedDateUTC: /Date(1659377631813+0000)/
                  IsReconciled: false
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchPaymentDelete'
            example:
              BatchPaymentID: 9bf296e9-0748-4d29-a3dc-24dde1098030
              Status: DELETED
    get:
      security:
      - OAuth2:
        - accounting.transactions
        - accounting.transactions.read
      tags:
      - Accounting
      - Transactions
      operationId: getBatchPayments
      summary: List batch payments for the organisation
      description: Returns the organisation's batch payments in a Batch Payments response payload. Use the available filtering,
        ordering, paging, or modified-since parameters when the endpoint exposes them.
