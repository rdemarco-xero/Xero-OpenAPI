    Invoice:
      description: Represents the Invoice schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/invoices/
      properties:
        Type:
          description: See Invoice Types
          type: string
          enum:
          - ACCPAY
          - ACCPAYCREDIT
          - APOVERPAYMENT
          - APPREPAYMENT
          - ACCREC
          - ACCRECCREDIT
          - AROVERPAYMENT
          - ARPREPAYMENT
          example: ValidationException
        Contact:
          description: The Contact value.
          allOf:
          - $ref: '#/components/schemas/Contact'
          example:
            ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
        LineItems:
          description: See LineItems
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
          example:
          - LineItemID: 00000000-0000-0000-0000-000000000000
            Description: My business checking account
            Quantity: 1.0
        Date:
          description: Date invoice was issued ΓÇô YYYY-MM-DD. If the Date element is not specified it will default to the
            current date based on the timezone setting of the organisation
          type: string
          example: '2020-01-01'
        DueDate:
          description: Date invoice is due ΓÇô YYYY-MM-DD
          type: string
          example: '2020-01-01'
        LineAmountTypes:
          description: The LineAmountTypes value.
          allOf:
          - $ref: '#/components/schemas/LineAmountTypes'
          type: string
          example: Exclusive
        InvoiceNumber:
          description: ACCREC ΓÇô Unique alpha numeric code identifying invoice (when missing will auto-generate from your
            Organisation Invoice Settings) (max length = 255)
          maxLength: 255
          type: string
          example: '12345'
        Reference:
          description: ACCREC only ΓÇô additional reference number
          type: string
          example: Foobar
        BrandingThemeID:
          description: See BrandingThemes
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Url:
          description: URL link to a source document ΓÇô shown as ΓÇ£Go to [appName]ΓÇ¥ in the Xero app
          type: string
          example: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        CurrencyCode:
          description: The CurrencyCode value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        CurrencyRate:
          description: The currency rate for a multicurrency invoice. If no rate is specified, the XE.com day rate is used.
            (max length = [18].[6])
          type: number
          format: double
          example: 1.0
        Status:
          description: See Invoice Status Codes
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - DELETED
          - AUTHORISED
          - PAID
          - VOIDED
          example: DRAFT
        SentToContact:
          description: Boolean to set whether the invoice in the Xero app should be marked as ΓÇ£sentΓÇ¥. This can be set
            only on invoices that have been approved
          type: boolean
          example: false
        ExpectedPaymentDate:
          description: Shown on sales invoices (Accounts Receivable) when this has been set
          type: string
          example: '2020-01-01'
        PlannedPaymentDate:
          description: Shown on bills (Accounts Payable) when this has been set
          type: string
          example: '2020-01-01'
        CISDeduction:
          description: CIS deduction for UK contractors
          readOnly: true
          type: number
          format: double
          example: 1.0
        CISRate:
          description: CIS Deduction rate for the organisation
          type: number
          format: double
          readOnly: true
          example: 1.0
        SubTotal:
          description: Total of invoice excluding taxes
          readOnly: true
          type: number
          format: double
          example: 1.0
        TotalTax:
          description: Total tax on invoice
          readOnly: true
          type: number
          format: double
          example: 1.0
        Total:
          description: Total of Invoice tax inclusive (i.e. SubTotal + TotalTax). This will be ignored if it doesnΓÇÖt equal
            the sum of the LineAmounts
          readOnly: true
          type: number
          format: double
          example: 1.0
        TotalDiscount:
          description: Total of discounts applied on the invoice line items
          readOnly: true
          type: number
          format: double
          example: 1.0
        InvoiceID:
          description: Xero generated unique identifier for invoice
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        RepeatingInvoiceID:
          description: Xero generated unique identifier for repeating invoices
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        HasAttachments:
          description: boolean to indicate if an invoice has an attachment
          readOnly: true
          type: boolean
          default: false
          example: false
        IsDiscounted:
          description: boolean to indicate if an invoice has a discount
          readOnly: true
          type: boolean
          example: false
        Payments:
          description: See Payments
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Payment'
          example:
          - Invoice:
              Type: ValidationException
