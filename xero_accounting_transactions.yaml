      tags:
      - Accounting
      - Transactions
      operationId: updateOrCreateBankTransactions
      summary: Create or update bank transactions
      description: Creates new bank transactions or updates existing ones from the supplied request body and returns the stored
        resources in a Bank Transactions response payload.
      parameters:
      - $ref: '#/components/parameters/summarizeErrors'
      - $ref: '#/components/parameters/unitdp'
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
