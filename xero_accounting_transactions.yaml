    Quote:
      description: Represents the Quote schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/Quotes/
      properties:
        QuoteID:
          description: QuoteID GUID is automatically generated and is returned after create or GET.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        QuoteNumber:
          description: Unique alpha numeric code identifying a quote (Max Length = 255)
          maxLength: 255
          type: string
          example: '12345'
        Reference:
          description: Additional reference number
          maxLength: 4000
          type: string
          example: Foobar
        Terms:
          description: Terms of the quote
          maxLength: 4000
          type: string
          example: example
        Contact:
          description: The Contact value.
          allOf:
          - $ref: '#/components/schemas/Contact'
          example:
            ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
        LineItems:
          description: See LineItems
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
          example:
          - LineItemID: 00000000-0000-0000-0000-000000000000
            Description: My business checking account
            Quantity: 1.0
        Date:
          description: Date quote was issued ΓÇô YYYY-MM-DD. If the Date element is not specified it will default to the current
            date based on the timezone setting of the organisation
          type: string
          example: '2020-01-01'
        DateString:
          description: Date the quote was issued (YYYY-MM-DD)
          type: string
          example: '2020-01-01'
        ExpiryDate:
          description: Date the quote expires ΓÇô YYYY-MM-DD.
          type: string
          example: '2020-01-01'
        ExpiryDateString:
          description: Date the quote expires ΓÇô YYYY-MM-DD.
          type: string
          example: '2020-01-01'
        Status:
          description: The Status value.
          allOf:
          - $ref: '#/components/schemas/QuoteStatusCodes'
          type: string
          example: DRAFT
        CurrencyCode:
          description: The CurrencyCode value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        CurrencyRate:
          description: The currency rate for a multicurrency quote
          type: number
          format: double
          example: 1.0
        SubTotal:
          description: Total of quote excluding taxes.
          readOnly: true
          type: number
          format: double
          example: 1.0
        TotalTax:
          description: Total tax on quote
          readOnly: true
          type: number
          format: double
          example: 1.0
        Total:
          description: Total of Quote tax inclusive (i.e. SubTotal + TotalTax). This will be ignored if it doesnΓÇÖt equal
            the sum of the LineAmounts
          readOnly: true
          type: number
          format: double
          example: 1.0
        TotalDiscount:
          description: Total of discounts applied on the quote line items
          readOnly: true
          type: number
          format: double
          example: 1.0
        Title:
          description: Title text for the quote
          type: string
          maxLength: 100
          example: Example title
        Summary:
          description: Summary text for the quote
          type: string
          maxLength: 3000
          example: Example summary
        BrandingThemeID:
          description: See BrandingThemes
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        UpdatedDateUTC:
          description: Last modified date UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        LineAmountTypes:
          description: See Quote Line Amount Types
          allOf:
          - $ref: '#/components/schemas/QuoteLineAmountTypes'
          type: string
          example: EXCLUSIVE
        StatusAttributeString:
          description: A string to indicate if a invoice status
          type: string
          example: ERROR
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      type: object
      example:
        QuoteID: 00000000-0000-0000-0000-000000000000
        QuoteNumber: '12345'
        Reference: Foobar
    QuoteLineAmountTypes:
      description: Line amounts are exclusive of tax by default if you donΓÇÖt specify this element. See Line Amount Types
      type: string
      enum:
      - EXCLUSIVE
      - INCLUSIVE
      - NOTAX
      example: EXCLUSIVE
    QuoteStatusCodes:
      description: The status of the quote.
      type: string
      enum:
      - DRAFT
      - SENT
      - DECLINED
      - ACCEPTED
      - INVOICED
      - DELETED
      example: DRAFT
    Quotes:
      description: Represents the Quotes schema used by the Accounting API.
      type: object
      properties:
        Quotes:
          description: The Quotes value.
          type: array
          items:
            $ref: '#/components/schemas/Quote'
          example:
          - QuoteID: 00000000-0000-0000-0000-000000000000
            QuoteNumber: '12345'
            Reference: Foobar
      example:
        Quotes:
        - QuoteID: 00000000-0000-0000-0000-000000000000
          QuoteNumber: '12345'
          Reference: Foobar
    RepeatingInvoice:
      description: Represents the RepeatingInvoice schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/repeating-invoices/
      properties:
        Type:
          description: See Invoice Types
          type: string
          enum:
          - ACCPAY
          - ACCREC
          example: ValidationException
        Contact:
          description: The Contact value.
          allOf:
          - $ref: '#/components/schemas/Contact'
          example:
            ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
        Schedule:
          description: The Schedule value.
          allOf:
          - $ref: '#/components/schemas/Schedule'
          example:
            Period: 1
            Unit: WEEKLY
            DueDate: 1
        LineItems:
          description: See LineItems
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
          example:
          - LineItemID: 00000000-0000-0000-0000-000000000000
            Description: My business checking account
            Quantity: 1.0
        LineAmountTypes:
          description: The LineAmountTypes value.
          allOf:
          - $ref: '#/components/schemas/LineAmountTypes'
          type: string
          example: Exclusive
        Reference:
          description: ACCREC only ΓÇô additional reference number
          type: string
          example: Foobar
        BrandingThemeID:
          description: See BrandingThemes
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        CurrencyCode:
          description: The CurrencyCode value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        Status:
          description: One of the following - DRAFT or AUTHORISED ΓÇô See Invoice Status Codes
          type: string
          enum:
          - DRAFT
          - AUTHORISED
          - DELETED
          example: DRAFT
        SubTotal:
          description: Total of invoice excluding taxes
          type: number
          format: double
          example: 1.0
        TotalTax:
          description: Total tax on invoice
          type: number
          format: double
          example: 1.0
        Total:
          description: Total of Invoice tax inclusive (i.e. SubTotal + TotalTax)
          type: number
          format: double
          example: 1.0
        RepeatingInvoiceID:
          description: Xero generated unique identifier for repeating invoice template
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ID:
          description: Xero generated unique identifier for repeating invoice template
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        HasAttachments:
          description: Boolean to indicate if an invoice has an attachment
          readOnly: true
          type: boolean
          default: false
          example: false
        Attachments:
          description: Displays array of attachments from the API
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          example:
          - AttachmentID: 00000000-0000-0000-0000-000000000000
            FileName: xero-dev.jpg
            Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        ApprovedForSending:
          description: Boolean to indicate whether the invoice has been approved for sending
          type: boolean
          default: false
          example: false
        SendCopy:
          description: Boolean to indicate whether a copy is sent to sender's email
          type: boolean
          default: false
          example: false
        MarkAsSent:
          description: Boolean to indicate whether the invoice in the Xero app displays as "sent"
          type: boolean
          default: false
          example: false
        IncludePDF:
          description: Boolean to indicate whether to include PDF attachment
          type: boolean
          default: false
          example: false
      type: object
      example:
        Type: ValidationException
        Contact:
          ContactID: 00000000-0000-0000-0000-000000000000
          MergedToContactID: 00000000-0000-0000-0000-000000000000
          ContactNumber: '12345'
        Schedule:
          Period: 1
          Unit: WEEKLY
          DueDate: 1
    RepeatingInvoices:
      description: Represents the RepeatingInvoices schema used by the Accounting API.
      type: object
      properties:
        RepeatingInvoices:
          description: The RepeatingInvoices value.
          type: array
          items:
            $ref: '#/components/schemas/RepeatingInvoice'
          example:
          - Type: ValidationException
            Contact:
              ContactID: 00000000-0000-0000-0000-000000000000
