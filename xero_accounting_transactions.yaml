        ContactGroupID:
          description: The Xero identifier for an contact group ΓÇô specified as a string following the endpoint name. e.g.
            /297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Contacts:
          description: The ContactID and Name of Contacts in a contact group. Returned on GETs when the ContactGroupID is
            supplied in the URL.
          type: array
