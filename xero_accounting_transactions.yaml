          allOf:
          - $ref: '#/components/schemas/Contact'
          example:
            ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
        LineItems:
          description: See LineItems
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
          example:
          - LineItemID: 00000000-0000-0000-0000-000000000000
            Description: My business checking account
            Quantity: 1.0
        BankAccount:
          description: The BankAccount value.
          allOf:
          - $ref: '#/components/schemas/Account'
          example:
            Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
        IsReconciled:
          description: Boolean to show if transaction is reconciled
          type: boolean
          example: false
        Date:
          description: Date of transaction ΓÇô YYYY-MM-DD
          type: string
          example: '2020-01-01'
        Reference:
          description: Reference for the transaction. Only supported for SPEND and RECEIVE transactions.
          type: string
          example: Foobar
        CurrencyCode:
          description: The CurrencyCode value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        CurrencyRate:
          description: Exchange rate to base currency when money is spent or received. e.g.0.7500 Only used for bank transactions
            in non base currency. If this isnΓÇÖt specified for non base currency accounts then either the user-defined rate
            (preference) or the XE.com day rate will be used. Setting currency is only supported on overpayments.
          type: number
          format: double
          example: 1.0
        Url:
          description: URL link to a source document ΓÇô shown as ΓÇ£Go to App NameΓÇ¥
          type: string
          example: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        Status:
          description: See Bank Transaction Status Codes
          type: string
          enum:
          - AUTHORISED
          - DELETED
          - VOIDED
          example: AUTHORISED
        LineAmountTypes:
          description: The LineAmountTypes value.
          allOf:
          - $ref: '#/components/schemas/LineAmountTypes'
          type: string
          example: Exclusive
        SubTotal:
          description: Total of bank transaction excluding taxes
          type: number
          format: double
          example: 1.0
        TotalTax:
          description: Total tax on bank transaction
          type: number
          format: double
          example: 1.0
        Total:
          description: Total of bank transaction tax inclusive
          type: number
          format: double
          example: 1.0
        BankTransactionID:
          description: Xero generated unique identifier for bank transaction
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        PrepaymentID:
          description: Xero generated unique identifier for a Prepayment. This will be returned on BankTransactions with a
            Type of SPEND-PREPAYMENT or RECEIVE-PREPAYMENT
          readOnly: true
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        OverpaymentID:
          description: Xero generated unique identifier for an Overpayment. This will be returned on BankTransactions with
            a Type of SPEND-OVERPAYMENT or RECEIVE-OVERPAYMENT
          readOnly: true
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        UpdatedDateUTC:
          description: Last modified date UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        HasAttachments:
          description: Boolean to indicate if a bank transaction has an attachment
          readOnly: true
          type: boolean
          default: false
          example: false
        StatusAttributeString:
          description: A string to indicate if a invoice status
          type: string
          example: ERROR
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      required:
      - Type
      - LineItems
      - BankAccount
      type: object
      example:
        Type: ValidationException
        LineItems:
        - LineItemID: 00000000-0000-0000-0000-000000000000
          Description: My business checking account
          Quantity: 1.0
        BankAccount:
          Code: 4400
          Name: Food Sales
          AccountID: 00000000-0000-0000-0000-000000000000
    BankTransactions:
      description: Represents the BankTransactions schema used by the Accounting API.
      type: object
      properties:
        pagination:
          description: The pagination value.
          allOf:
          - $ref: '#/components/schemas/Pagination'
          example:
            page: 1
            pageSize: 100
            pageCount: 1
        Warnings:
