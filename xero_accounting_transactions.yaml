        TotalTax:
          description: Total tax on purchase order
          readOnly: true
          type: number
          format: double
          example: 1.0
        Total:
          description: Total of Purchase Order tax inclusive (i.e. SubTotal + TotalTax)
          readOnly: true
          type: number
          format: double
          example: 1.0
        TotalDiscount:
          description: Total of discounts applied on the purchase order line items
