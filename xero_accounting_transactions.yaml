          type: string
          example: John
        LastName:
          description: Last name of person
          type: string
          example: Doe
        EmailAddress:
          description: Email address of person
          type: string
          example: user@example.com
        IncludeInEmails:
          description: boolean to indicate whether contact should be included on emails with invoices etc.
          type: boolean
          example: user@example.com
      type: object
      example:
        FirstName: John
        LastName: Doe
        EmailAddress: user@example.com
    CreditNote:
      description: Represents the CreditNote schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/credit-notes/
      properties:
        Type:
          description: See Credit Note Types
          type: string
          enum:
          - ACCPAYCREDIT
          - ACCRECCREDIT
          example: ValidationException
        Contact:
          description: The Contact value.
          allOf:
          - $ref: '#/components/schemas/Contact'
          example:
            ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
        Date:
          description: The date the credit note is issued YYYY-MM-DD. If the Date element is not specified then it will default
            to the current date based on the timezone setting of the organisation
          type: string
          example: '2020-01-01'
        DueDate:
          description: Date invoice is due ΓÇô YYYY-MM-DD
          type: string
          example: '2020-01-01'
        Status:
          description: See Credit Note Status Codes
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - DELETED
          - AUTHORISED
          - PAID
          - VOIDED
          example: DRAFT
        LineAmountTypes:
          description: The LineAmountTypes value.
          allOf:
          - $ref: '#/components/schemas/LineAmountTypes'
          type: string
          example: Exclusive
        LineItems:
          description: See Invoice Line Items
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
          example:
          - LineItemID: 00000000-0000-0000-0000-000000000000
            Description: My business checking account
            Quantity: 1.0
        SubTotal:
          description: The subtotal of the credit note excluding taxes
          type: number
          format: double
          example: 1.0
        TotalTax:
          description: The total tax on the credit note
          type: number
          format: double
          example: 1.0
        Total:
          description: The total of the Credit Note(subtotal + total tax)
          type: number
          format: double
          example: 1.0
        CISDeduction:
          description: CIS deduction for UK contractors
          readOnly: true
          type: number
          format: double
          example: 1.0
        CISRate:
          description: CIS Deduction rate for the organisation
          type: number
          format: double
          readOnly: true
          example: 1.0
        UpdatedDateUTC:
          description: UTC timestamp of last update to the credit note
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        CurrencyCode:
          description: The specified currency code
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        FullyPaidOnDate:
          description: Date when credit note was fully paid(UTC format)
          type: string
          example: '2020-01-01'
        CreditNoteID:
          description: Xero generated unique identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        CreditNoteNumber:
          description: ACCRECCREDIT ΓÇô Unique alpha numeric code identifying credit note (when missing will auto-generate
            from your Organisation Invoice Settings)
          type: string
          example: '12345'
        Reference:
          description: ACCRECCREDIT only ΓÇô additional reference number
          type: string
          example: Foobar
        SentToContact:
          description: Boolean to set whether the credit note in the Xero app should be marked as ΓÇ£sentΓÇ¥. This can be
            set only on credit notes that have been approved
          readOnly: true
          type: boolean
          example: false
        CurrencyRate:
          description: The currency rate for a multicurrency invoice. If no rate is specified, the XE.com day rate is used
          type: number
          format: double
          example: 1.0
        RemainingCredit:
          description: The remaining credit balance on the Credit Note
          type: number
          format: double
          example: 1.0
        Allocations:
          description: See Allocations
          type: array
          items:
            $ref: '#/components/schemas/Allocation'
          example:
          - Amount: 1.0
            Invoice:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              LineItems:
              - LineItemID: 00000000-0000-0000-0000-000000000000
                Description: My business checking account
                Quantity: 1.0
            Date: '2020-01-01'
            AllocationID: 00000000-0000-0000-0000-000000000000
        AppliedAmount:
          description: The amount of applied to an invoice
          type: number
          format: double
          example: 2.0
        Payments:
          description: See Payments
          type: array
          items:
            $ref: '#/components/schemas/Payment'
          example:
          - Invoice:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              LineItems:
              - LineItemID: 00000000-0000-0000-0000-000000000000
                Description: My business checking account
                Quantity: 1.0
            CreditNote:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              Date: '2020-01-01'
            Prepayment:
              Type: ValidationException
              Contact:
                ContactID: 00000000-0000-0000-0000-000000000000
                MergedToContactID: 00000000-0000-0000-0000-000000000000
                ContactNumber: '12345'
              Date: '2020-01-01'
        BrandingThemeID:
          description: See BrandingThemes
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        StatusAttributeString:
          description: A string to indicate if a invoice status
          type: string
          example: ERROR
        HasAttachments:
          description: boolean to indicate if a credit note has an attachment
          type: boolean
          default: false
          example: false
        HasErrors:
          description: A boolean to indicate if a credit note has an validation errors
          type: boolean
          default: false
          example: false
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        Warnings:
          description: Displays array of warning messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        InvoiceAddresses:
          description: An array of addresses used to auto calculate sales tax
          type: array
          items:
            $ref: '#/components/schemas/InvoiceAddress'
          example:
          - InvoiceAddressType: FROM
            AddressLine1: example
            AddressLine2: example
      type: object
      example:
        Type: ValidationException
        Contact:
          ContactID: 00000000-0000-0000-0000-000000000000
          MergedToContactID: 00000000-0000-0000-0000-000000000000
          ContactNumber: '12345'
        Date: '2020-01-01'
    CreditNotes:
