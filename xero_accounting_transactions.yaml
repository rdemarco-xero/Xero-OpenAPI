      summary: List sales invoices and purchase bills
      description: Returns the sales invoices and purchase bills available to the organisation in a Invoices response payload.
        Use the available filtering, ordering, paging, or modified-since parameters when the endpoint exposes them.
      parameters:
      - $ref: '#/components/parameters/ifModifiedSince'
      - in: query
        name: where
        description: Filter by an any element
        example: Status=="DRAFT"
        schema:
          type: string
          example: example
      - in: query
        name: order
        description: Order by an any element
        example: InvoiceNumber ASC
        schema:
          type: string
          example: example
      - in: query
        name: IDs
        description: Filter by a comma-separated list of InvoicesIDs.
        style: form
        explode: false
        example: '&quot;00000000-0000-0000-0000-000000000000&quot;'
        schema:
          type: array
          items:
            type: string
            format: uuid
          example:
          - 00000000-0000-0000-0000-000000000000
      - in: query
        name: InvoiceNumbers
        description: Filter by a comma-separated list of InvoiceNumbers.
        style: form
        explode: false
        example: '&quot;INV-001&quot;, &quot;INV-002&quot;'
        schema:
          type: array
          items:
            type: string
          example:
          - '12345'
      - in: query
        name: ContactIDs
        description: Filter by a comma-separated list of ContactIDs.
        style: form
        explode: false
        example: '&quot;00000000-0000-0000-0000-000000000000&quot;'
        schema:
          type: array
          items:
            type: string
            format: uuid
          example:
          - 00000000-0000-0000-0000-000000000000
      - in: query
        name: Statuses
        description: Filter by a comma-separated list Statuses. For faster response times we recommend using these explicit
          parameters instead of passing OR conditions into the Where filter.
        explode: false
        example: '&quot;DRAFT&quot;, &quot;SUBMITTED&quot;'
        schema:
          type: array
          items:
            type: string
          example:
          - ACTIVE
