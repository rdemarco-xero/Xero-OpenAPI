          description: See Payment Types.
          readOnly: true
          type: string
          enum:
          - ACCRECPAYMENT
          - ACCPAYPAYMENT
          - ARCREDITPAYMENT
          - APCREDITPAYMENT
          - AROVERPAYMENTPAYMENT
          - ARPREPAYMENTPAYMENT
          - APPREPAYMENTPAYMENT
          - APOVERPAYMENTPAYMENT
          example: ACCRECPAYMENT
        UpdatedDateUTC:
          description: UTC timestamp of last update to the payment
          type: string
          example: /Date(1573755038314)/
