  /LinkedTransactions:
    summary: Manage linked transactions between purchase orders and bills
    description: Manage linked transactions between purchase orders and bills.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.transactions
        - accounting.transactions.read
      tags:
      - Accounting
      - Transactions
      operationId: getLinkedTransactions
      summary: List linked billable expense records
      description: Returns the linked billable expense records available to the organisation in a Linked Transactions response
        payload. Use the available filtering, ordering, paging, or modified-since parameters when the endpoint exposes them.
      parameters:
      - in: query
        name: page
        description: Up to 100 linked transactions will be returned in a single API call. Use the page parameter to specify
          the page to be returned e.g. page=1.
        example: 1
        schema:
          type: integer
          example: 1
      - in: query
        name: LinkedTransactionID
        description: The Xero identifier for an Linked Transaction
        example: 00000000-0000-0000-0000-000000000000
        schema:
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      - in: query
        name: SourceTransactionID
        description: Filter by the SourceTransactionID. Get the linked transactions created from a particular ACCPAY invoice
        example: 00000000-0000-0000-0000-000000000000
        schema:
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      - in: query
        name: ContactID
        description: Filter by the ContactID. Get all the linked transactions that have been assigned to a particular customer.
        example: 00000000-0000-0000-0000-000000000000
        schema:
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      - in: query
        name: Status
        description: Filter by the combination of ContactID and Status. Get  the linked transactions associated to a  customer
          and with a status
        example: APPROVED
        schema:
          type: string
          example: ACTIVE
      - in: query
        name: TargetTransactionID
        description: Filter by the TargetTransactionID. Get all the linked transactions allocated to a particular ACCREC invoice
        example: 00000000-0000-0000-0000-000000000000
        schema:
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: Success - return response of type LinkedTransactions array with all LinkedTransaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkedTransactions'
              example:
