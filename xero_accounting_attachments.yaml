openapi: 3.0.0
info:
  title: Xero Accounting API
  description: The Xero Accounting API exposes accounting resources for working with contacts, transactions, reports, settings,
    and related organisation data.
  version: 12.0.0
  termsOfService: https://developer.xero.com/xero-developer-platform-terms-conditions/
  contact:
    name: Xero Platform Team
    email: api@xero.com
    url: https://developer.xero.com
servers:
- description: The Xero Accounting API exposes accounting and related functions of the main Xero application and can be used
    for a variety of purposes such as creating transactions like invoices and credit notes, right through to extracting accounting
    data via our reports endpoint.
  url: https://api.xero.com/api.xro/2.0
tags:
- name: Accounting
  description: Core accounting resources including accounts, invoices, contacts, payments, and reports.
- name: Attachments
  description: Binary/file attachment resources across accounting entities.
paths:
  /Accounts/{AccountID}/Attachments:
    summary: List attachments on a specific account
    description: List attachments on a specific account.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.attachments
        - accounting.attachments.read
      tags:
      - Accounting
      - Attachments
      operationId: getAccountAttachments
      summary: List attachments for an account
      description: Returns attachment metadata for the specified account, including file names, content types, and download
        links, in a Attachments response payload.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Success - return response of type Attachments array of Attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachments'
              example:
                Id: 439c1573-3cd8-4697-a9f6-81fa651ee8f3
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550852630329)/
                Attachments:
                - AttachmentID: 52a643be-cd5c-489f-9778-53a9fd337756
                  FileName: sample5.jpg
                  Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
                  MimeType: image/jpg
                  ContentLength: 2878711
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /Accounts/{AccountID}/Attachments/{AttachmentID}:
    summary: Retrieve a specific account attachment by ID
    description: Retrieve a specific account attachment by ID.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.attachments
        - accounting.attachments.read
      tags:
      - Accounting
      - Attachments
      operationId: getAccountAttachmentById
      summary: Download a account attachment by attachment ID
      description: Downloads the requested attachment for the specified account as binary file content, using the supplied
        attachment ID to select the file.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      - $ref: '#/components/parameters/AttachmentID'
      - $ref: '#/components/parameters/ContentType'
      responses:
        '200':
          description: Success - return response of attachment for Account as binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                example: ZXhhbXBsZQ==
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /Accounts/{AccountID}/Attachments/{FileName}:
    summary: Retrieve or upload an account attachment by file name
    description: Retrieve or upload an account attachment by file name.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    post:
      security:
      - OAuth2:
        - accounting.attachments
      tags:
      - Accounting
      - Attachments
      operationId: updateAccountAttachmentByFileName
      summary: Update a account attachment by file name
      description: Writes the attachment content for the specified account and returns the stored attachment metadata in binary
        file content.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      - $ref: '#/components/parameters/FileName'
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Success - return response of type Attachments array of Attachment
