components:
  parameters:
    AccountID:
      required: true
      in: path
      name: AccountID
      description: Unique identifier for Account object
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    AttachmentID:
      required: true
      in: path
      name: AttachmentID
      description: Unique identifier for Attachment object
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    BankTransactionID:
      required: true
      in: path
      name: BankTransactionID
      description: Xero generated unique identifier for a bank transaction
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    BankTransferID:
      required: true
      in: path
      name: BankTransferID
      description: Xero generated unique identifier for a bank transfer
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    ContactID:
      required: true
      in: path
      name: ContactID
      description: Unique identifier for a Contact
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    ContentType:
      required: true
      in: header
      name: contentType
      description: The mime type of the attachment file you are retrieving i.e image/jpg, application/pdf
      example: image/jpg
      schema:
        type: string
        example: image/jpg
    CreditNoteID:
      required: true
      in: path
      name: CreditNoteID
      description: Unique identifier for a Credit Note
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    FileName:
      required: true
      in: path
      name: FileName
      description: Name of the attachment
      example: xero-dev.jpg
      schema:
        type: string
        example: xero-dev.jpg
    InvoiceID:
      required: true
      in: path
      name: InvoiceID
      description: Unique identifier for an Invoice
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    ManualJournalID:
      required: true
      in: path
      name: ManualJournalID
      description: Unique identifier for a ManualJournal
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    PurchaseOrderID:
      required: true
      in: path
      name: PurchaseOrderID
      description: Unique identifier for an Purchase Order
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    QuoteID:
      required: true
      in: path
      name: QuoteID
      description: Unique identifier for an Quote
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    RepeatingInvoiceID:
      required: true
      in: path
      name: RepeatingInvoiceID
      description: Unique identifier for a Repeating Invoice
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    idempotencyKey:
      in: header
      name: Idempotency-Key
      description: This allows you to safely retry requests without the risk of duplicate processing. 128 character max.
      example: KEY_VALUE
      schema:
        type: string
        example: KEY_VALUE
    includeOnline:
      in: query
      name: IncludeOnline
      description: Allows an attachment to be seen by the end customer within their online invoice
      example: true
      schema:
        type: boolean
        default: false
        example: true
    requiredHeader:
      in: header
      name: xero-tenant-id
      description: Xero identifier for Tenant
      example: YOUR_XERO_TENANT_ID
      schema:
        type: string
        example: YOUR_XERO_TENANT_ID
      required: true
  responses:
    400Error:
      description: A failed request due to validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    429Error:
      description: Too Many Requests - The rate limit has been exceeded.
      headers:
        Retry-After:
          description: The number of seconds to wait before retrying the request.
          schema:
            type: integer
            example: 5
        xero-correlation-id:
          description: A unique identifier for the request, useful for troubleshooting with support.
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
      content: {}
    500Error:
      description: Internal Server Error - An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            Title: An error occurred
            Detail: An error occurred in Xero. Check the API Status page http://status.developer.xero.com for current service
              status.
            Status: 500
            Instance: 6964b201-1442-41f2-b22f-1e34f5baab08
  schemas:
    Attachment:
      description: Represents the Attachment schema used by the Accounting API.
      type: object
      externalDocs:
        url: http://developer.xero.com/documentation/api/attachments/
      properties:
        AttachmentID:
          description: Unique ID for the file
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        FileName:
          description: Name of the file
          type: string
          example: xero-dev.jpg
        Url:
          description: URL to the file on xero.com
          type: string
          example: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        MimeType:
          description: Type of file
          type: string
          example: image/jpg
        ContentLength:
          description: Length of the file content
          type: integer
          example: 1
        IncludeOnline:
          description: Include the file with the online invoice
          type: boolean
          example: false
      example:
        AttachmentID: 00000000-0000-0000-0000-000000000000
        FileName: xero-dev.jpg
        Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
    Attachments:
      description: Represents the Attachments schema used by the Accounting API.
      type: object
      properties:
        Attachments:
          description: The Attachments value.
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          example:
          - AttachmentID: 00000000-0000-0000-0000-000000000000
            FileName: xero-dev.jpg
            Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
      example:
        Attachments:
        - AttachmentID: 00000000-0000-0000-0000-000000000000
          FileName: xero-dev.jpg
          Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
    Element:
      description: Represents the Element schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/http-response-codes
      properties:
        ValidationErrors:
          description: Array of Validation Error message
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        BatchPaymentID:
          description: Unique ID for batch payment object with validation error
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        BankTransactionID:
          description: The BankTransactionID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        CreditNoteID:
          description: The CreditNoteID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ContactID:
          description: The ContactID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        InvoiceID:
          description: The InvoiceID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ItemID:
          description: The ItemID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        PurchaseOrderID:
          description: The PurchaseOrderID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      type: object
      example:
        ValidationErrors:
        - Message: One or more validation errors occurred.
        BatchPaymentID: 00000000-0000-0000-0000-000000000000
        BankTransactionID: 00000000-0000-0000-0000-000000000000
    Error:
      description: Represents the Error schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/http-response-codes
      properties:
        ErrorNumber:
          description: Exception number
          type: integer
          example: 10
        Type:
          description: Exception type
          type: string
          example: ValidationException
        Message:
          description: Exception message
          type: string
          example: One or more validation errors occurred.
        Elements:
          description: Array of Elements of validation Errors
          type: array
          items:
            $ref: '#/components/schemas/Element'
          example:
          - ValidationErrors:
            - Message: One or more validation errors occurred.
            BatchPaymentID: 00000000-0000-0000-0000-000000000000
            BankTransactionID: 00000000-0000-0000-0000-000000000000
      type: object
      example:
        ErrorNumber: 10
        Type: ValidationException
        Message: One or more validation errors occurred.
    ErrorResponse:
      type: object
      properties:
        Title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: An error occurred
        Detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: An error occurred in Xero. Check the API Status page...
        Status:
          type: integer
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          example: 500
        Instance:
          type: string
          format: uuid
          description: A URI reference that identifies the specific occurrence of the problem (often used as a Correlation
            ID).
          example: 00000000-0000-0000-0000-000000000000
    ValidationError:
      description: Represents the ValidationError schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/http-response-codes
      properties:
        Message:
          description: Validation error message
          type: string
          example: One or more validation errors occurred.
      type: object
      example:
        Message: One or more validation errors occurred.
  securitySchemes:
    OAuth2:
      type: oauth2
      description: For more information
      flows:
        authorizationCode:
          authorizationUrl: https://login.xero.com/identity/connect/authorize
          tokenUrl: https://identity.xero.com/connect/token
          scopes:
            accounting.attachments: Grant read-write access to attachments
            accounting.attachments.read: Grant read-only access to attachments
