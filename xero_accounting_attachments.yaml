                $ref: '#/components/schemas/Attachments'
              example:
                Id: c8d6413a-1da2-4faa-9848-21f60443e906
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550859714477)/
                Attachments:
                - AttachmentID: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  FileName: sample5.jpg
                  Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
                  MimeType: image/jpg
                  ContentLength: 2878711
        '400':
          description: Validation Error - some data was incorrect returns response of type Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        description: Byte array of file in body of request
        content:
          application/octet-stream:
            schema:
              type: string
              format: byte
              example: ZXhhbXBsZQ==
    get:
      security:
      - OAuth2:
        - accounting.attachments
        - accounting.attachments.read
      tags:
      - Accounting
      - Attachments
      operationId: getAccountAttachmentByFileName
      summary: Download a account attachment by file name
      description: Downloads the requested attachment for the specified account as binary file content, using the supplied
        file name to select the file.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      - $ref: '#/components/parameters/FileName'
      - $ref: '#/components/parameters/ContentType'
      responses:
        '200':
          description: Success - return response of attachment for Account as binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                example: ZXhhbXBsZQ==
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
    put:
      security:
      - OAuth2:
        - accounting.attachments
      tags:
      - Accounting
      - Attachments
      operationId: createAccountAttachmentByFileName
      summary: Upload a account attachment by file name
      description: Writes the attachment content for the specified account and returns the stored attachment metadata in binary
        file content.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      - $ref: '#/components/parameters/FileName'
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Success - return response of type Attachments array of Attachment
          content:
            application/json:
