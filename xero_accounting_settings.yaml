    TrackingCategories:
      description: Represents the TrackingCategories schema used by the Accounting API.
      type: object
      properties:
        TrackingCategories:
          description: The TrackingCategories value.
          type: array
          items:
            $ref: '#/components/schemas/TrackingCategory'
          example:
          - TrackingCategoryID: 00000000-0000-0000-0000-000000000000
            TrackingOptionID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
      example:
        TrackingCategories:
        - TrackingCategoryID: 00000000-0000-0000-0000-000000000000
          TrackingOptionID: 00000000-0000-0000-0000-000000000000
          Name: Food Sales
    TrackingCategory:
      description: Represents the TrackingCategory schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/tracking-categories/
      properties:
        TrackingCategoryID:
          description: The Xero identifier for a tracking category e.g. 297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        TrackingOptionID:
          description: The Xero identifier for a tracking option e.g. dc54c220-0140-495a-b925-3246adc0075f
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Name:
          description: The name of the tracking category e.g. Department, Region (max length = 100)
          maxLength: 100
          type: string
          example: Food Sales
        Option:
          description: The option name of the tracking option e.g. East, West (max length = 100)
          maxLength: 100
          type: string
          example: North
        Status:
          description: The status of a tracking category
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
          - DELETED
          example: ACTIVE
        Options:
          description: See Tracking Options
          type: array
          items:
            $ref: '#/components/schemas/TrackingOption'
          example:
          - TrackingOptionID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
            Status: ACTIVE
      type: object
      example:
        TrackingCategoryID: 00000000-0000-0000-0000-000000000000
        TrackingOptionID: 00000000-0000-0000-0000-000000000000
        Name: Food Sales
    TrackingOption:
      description: Represents the TrackingOption schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/tracking-categories/
      properties:
        TrackingOptionID:
          description: The Xero identifier for a tracking option e.g. ae777a87-5ef3-4fa0-a4f0-d10e1f13073a
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Name:
          description: The name of the tracking option e.g. Marketing, East (max length = 100)
          maxLength: 100
          type: string
          example: Food Sales
        Status:
          description: The status of a tracking option
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
          - DELETED
          example: ACTIVE
        TrackingCategoryID:
          description: Filter by a tracking category e.g. 297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      type: object
      example:
        TrackingOptionID: 00000000-0000-0000-0000-000000000000
        Name: Food Sales
        Status: ACTIVE
    TrackingOptions:
      description: Represents the TrackingOptions schema used by the Accounting API.
      type: object
      properties:
        Options:
          description: The Options value.
          type: array
          items:
            $ref: '#/components/schemas/TrackingOption'
          example:
          - TrackingOptionID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
            Status: ACTIVE
      example:
        Options:
        - TrackingOptionID: 00000000-0000-0000-0000-000000000000
          Name: Food Sales
          Status: ACTIVE
    User:
      description: Represents the User schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/users/
      properties:
        UserID:
          description: Xero identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        EmailAddress:
          description: Email address of user
          type: string
          example: user@example.com
        FirstName:
          description: First name of user
          type: string
          example: John
        LastName:
          description: Last name of user
          type: string
          example: Doe
        UpdatedDateUTC:
          description: Timestamp of last change to user
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        IsSubscriber:
          description: Boolean to indicate if user is the subscriber
          type: boolean
          example: false
        OrganisationRole:
          description: User role that defines permissions in Xero and via API (READONLY, INVOICEONLY, STANDARD, FINANCIALADVISER,
            etc)
          type: string
          enum:
          - READONLY
          - INVOICEONLY
          - STANDARD
          - FINANCIALADVISER
          - MANAGEDCLIENT
          - CASHBOOKCLIENT
          - UNKNOWN
          - REMOVED
          example: READONLY
      type: object
      example:
        UserID: 00000000-0000-0000-0000-000000000000
        EmailAddress: user@example.com
        FirstName: John
    Users:
      description: Represents the Users schema used by the Accounting API.
      type: object
      properties:
        Users:
          description: The Users value.
          type: array
          items:
            $ref: '#/components/schemas/User'
          example:
          - UserID: 00000000-0000-0000-0000-000000000000
            EmailAddress: user@example.com
            FirstName: John
      example:
        Users:
        - UserID: 00000000-0000-0000-0000-000000000000
          EmailAddress: user@example.com
          FirstName: John
    ValidationError:
      description: Represents the ValidationError schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/http-response-codes
      properties:
        Message:
          description: Validation error message
          type: string
          example: One or more validation errors occurred.
      type: object
      example:
        Message: One or more validation errors occurred.
  securitySchemes:
    OAuth2:
      type: oauth2
      description: For more information
      flows:
        authorizationCode:
          authorizationUrl: https://login.xero.com/identity/connect/authorize
          tokenUrl: https://identity.xero.com/connect/token
          scopes:
            accounting.settings: Grant read-write access to organisation and account settings
            accounting.settings.read: Grant read-only access to organisation and account settings
