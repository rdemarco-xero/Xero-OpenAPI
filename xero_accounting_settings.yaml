    Item:
      description: Represents the Item schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/items/
      properties:
        Code:
          description: User defined item code (max length = 30)
          maxLength: 30
          type: string
          example: 4400
        InventoryAssetAccountCode:
          description: The inventory asset account for the item. The account must be of type INVENTORY. The  COGSAccountCode
            in PurchaseDetails is also required to create a tracked item
          type: string
          example: ABC-123
        Name:
          description: The name of the item (max length = 50)
          maxLength: 50
          type: string
          example: Food Sales
        IsSold:
          description: Boolean value, defaults to true. When IsSold is true the item will be available on sales transactions
            in the Xero UI. If IsSold is updated to false then Description and SalesDetails values will be nulled.
          type: boolean
          example: false
        IsPurchased:
          description: Boolean value, defaults to true. When IsPurchased is true the item is available for purchase transactions
            in the Xero UI. If IsPurchased is updated to false then PurchaseDescription and PurchaseDetails values will be
            nulled.
          type: boolean
          example: false
        Description:
          description: The sales description of the item (max length = 4000)
          maxLength: 4000
          type: string
          example: My business checking account
        PurchaseDescription:
          description: The purchase description of the item (max length = 4000)
          maxLength: 4000
          type: string
          example: Example description
        PurchaseDetails:
          description: The PurchaseDetails value.
          allOf:
          - $ref: '#/components/schemas/Purchase'
          example:
            UnitPrice: 1.0
            AccountCode: 090
            COGSAccountCode: ABC-123
        SalesDetails:
          description: The SalesDetails value.
          allOf:
          - $ref: '#/components/schemas/Purchase'
          example:
            UnitPrice: 1.0
            AccountCode: 090
            COGSAccountCode: ABC-123
        IsTrackedAsInventory:
          description: True for items that are tracked as inventory. An item will be tracked as inventory if the InventoryAssetAccountCode
            and COGSAccountCode are set.
          type: boolean
          example: false
        TotalCostPool:
          description: The value of the item on hand. Calculated using average cost accounting.
          type: number
          format: double
          example: 1.0
        QuantityOnHand:
          description: The quantity of the item on hand
          type: number
          format: double
          example: 1.0
        UpdatedDateUTC:
          description: Last modified date in UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        ItemID:
          description: The Xero identifier for an Item
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        StatusAttributeString:
          description: Status of object
          type: string
          example: ERROR
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      required:
      - Code
      type: object
      example:
        Code: 4400
        InventoryAssetAccountCode: ABC-123
        Name: Food Sales
    Items:
      description: Represents the Items schema used by the Accounting API.
      type: object
      properties:
        Items:
          description: The Items value.
          type: array
          items:
            $ref: '#/components/schemas/Item'
          example:
          - Code: 4400
            InventoryAssetAccountCode: ABC-123
            Name: Food Sales
      example:
        Items:
        - Code: 4400
          InventoryAssetAccountCode: ABC-123
          Name: Food Sales
    Organisation:
      description: Represents the Organisation schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/organisation/
      properties:
        OrganisationID:
          description: Unique Xero identifier
          type: string
          format: uuid
          example: 8be9db36-3598-4755-ba5c-c2dbc8c4a7a2
        APIKey:
          description: Display a unique key used for Xero-to-Xero transactions
          type: string
          example: example
        Name:
          description: Display name of organisation shown in Xero
          type: string
          example: Food Sales
        LegalName:
          description: Organisation name shown on Reports
          type: string
          example: Example Name
        PaysTax:
          description: Boolean to describe if organisation is registered with a local tax authority i.e. true, false
          type: boolean
          example: false
        Version:
          description: See Version Types
          type: string
          enum:
          - AU
          - NZ
          - GLOBAL
          - UK
          - US
          - AUONRAMP
          - NZONRAMP
          - GLOBALONRAMP
          - UKONRAMP
          - USONRAMP
          example: AU
        OrganisationType:
          description: Organisation Type
          type: string
          enum:
          - ACCOUNTING_PRACTICE
          - CCORPORATIONLLC
          - COMPANY
          - CHARITY
          - CLUB_OR_SOCIETY
          - INDIVIDUAL
          - LLC
          - LOOK_THROUGH_COMPANY
          - NOT_FOR_PROFIT
          - NOTLLC
          - PARTNERSHIP
          - PARTNERSHIPLLC
          - PERSONAL
          - S_CORPORATION
          - SCORPORATIONLLC
          - SELF_MANAGED_SUPERANNUATION_FUND
          - SINGLEMEMBERLLC
          - SOLE_TRADER
          - SUPERANNUATION_FUND
          - TRUST
          - UNSPECIFIED
          example: ACCOUNTING_PRACTICE
        BaseCurrency:
          description: The BaseCurrency value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        CountryCode:
          description: The CountryCode value.
          allOf:
          - $ref: '#/components/schemas/CountryCode'
          type: string
          example: AD
        IsDemoCompany:
          description: Boolean to describe if organisation is a demo company.
          type: boolean
          example: false
        OrganisationStatus:
          description: Will be set to ACTIVE if you can connect to organisation via the Xero API
          type: string
          example: ACTIVE
        RegistrationNumber:
          description: Shows for New Zealand, Australian and UK organisations
          type: string
          example: '12345'
        EmployerIdentificationNumber:
          description: Shown if set. US Only.
          type: string
          example: '12345'
        TaxNumber:
          description: Shown if set. Displays in the Xero UI as Tax File Number (AU), GST Number (NZ), VAT Number (UK) and
            Tax ID Number (US & Global).
          type: string
          example: '12345'
        FinancialYearEndDay:
          description: Calendar day e.g. 0-31
          type: integer
          example: 2024
        FinancialYearEndMonth:
          description: Calendar Month e.g. 1-12
          type: integer
          example: 1
        SalesTaxBasis:
          description: The accounting basis used for tax returns. See Sales Tax Basis
          type: string
          enum:
          - PAYMENTS
          - INVOICE
          - NONE
          - CASH
          - ACCRUAL
          - FLATRATECASH
          - FLATRATEACCRUAL
          - ACCRUALS
          example: PAYMENTS
        SalesTaxPeriod:
          description: The frequency with which tax returns are processed. See Sales Tax Period
          type: string
          enum:
          - MONTHLY
          - QUARTERLY1
          - QUARTERLY2
          - QUARTERLY3
          - ANNUALLY
          - ONEMONTHS
          - TWOMONTHS
          - SIXMONTHS
          - 1MONTHLY
          - 2MONTHLY
          - 3MONTHLY
          - 6MONTHLY
          - QUARTERLY
          - YEARLY
          - NONE
          example: MONTHLY
        DefaultSalesTax:
          description: The default for LineAmountTypes on sales transactions
          type: string
          example: example
        DefaultPurchasesTax:
          description: The default for LineAmountTypes on purchase transactions
          type: string
          example: false
        PeriodLockDate:
          description: Shown if set. See lock dates
          type: string
          example: '2020-01-01'
        EndOfYearLockDate:
          description: Shown if set. See lock dates
          type: string
          example: '2020-01-01'
        CreatedDateUTC:
          description: Timestamp when the organisation was created in Xero
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        Timezone:
          description: The Timezone value.
          allOf:
          - $ref: '#/components/schemas/TimeZone'
          type: string
          example: AFGHANISTANSTANDARDTIME
        OrganisationEntityType:
          description: Organisation Entity Type
          type: string
          enum:
          - ACCOUNTING_PRACTICE
          - CCORPORATIONLLC
          - COMPANY
          - CHARITY
          - CLUB_OR_SOCIETY
          - INDIVIDUAL
          - LLC
          - LOOK_THROUGH_COMPANY
          - NOT_FOR_PROFIT
          - NOTLLC
          - PARTNERSHIP
          - PARTNERSHIPLLC
          - PERSONAL
          - S_CORPORATION
          - SCORPORATIONLLC
          - SELF_MANAGED_SUPERANNUATION_FUND
          - SINGLEMEMBERLLC
          - SOLE_TRADER
          - SUPERANNUATION_FUND
          - TRUST
          - UNSPECIFIED
          example: ACCOUNTING_PRACTICE
        ShortCode:
          description: A unique identifier for the organisation. Potential uses.
          type: string
          example: ABC-123
        Class:
          description: Organisation Classes describe which plan the Xero organisation is on (e.g. DEMO, TRIAL, PREMIUM)
          type: string
          enum:
          - DEMO
          - TRIAL
          - STARTER
          - STANDARD
          - PREMIUM
          - PREMIUM_20
          - PREMIUM_50
          - PREMIUM_100
          - LEDGER
          - GST_CASHBOOK
          - NON_GST_CASHBOOK
          - ULTIMATE
          - LITE
          - ULTIMATE_10
          - ULTIMATE_20
          - ULTIMATE_50
          - ULTIMATE_100
          - IGNITE
          - GROW
          - COMPREHENSIVE
          - SIMPLE
          example: DEMO
        Edition:
          description: BUSINESS or PARTNER. Partner edition organisations are sold exclusively through accounting partners
            and have restricted functionality (e.g. no access to invoicing)
          type: string
          enum:
          - BUSINESS
          - PARTNER
          example: BUSINESS
        LineOfBusiness:
          description: Description of business type as defined in Organisation settings
          type: string
          example: example
        Addresses:
          description: Address details for organisation ΓÇô see Addresses
          type: array
          items:
            $ref: '#/components/schemas/AddressForOrganisation'
          example:
          - AddressType: POBOX
            AddressLine1: example
            AddressLine2: example
        Phones:
          description: Phones details for organisation ΓÇô see Phones
          type: array
          items:
            $ref: '#/components/schemas/Phone'
          example:
          - PhoneType: DEFAULT
            PhoneNumber: 555-1234
            PhoneAreaCode: ABC-123
        ExternalLinks:
          description: Organisation profile links for popular services such as Facebook,Twitter, GooglePlus and LinkedIn.
            You can also add link to your website here. Shown if Organisation settings  is updated in Xero. See ExternalLinks
            below
          type: array
          items:
            $ref: '#/components/schemas/ExternalLink'
          example:
          - LinkType: Facebook
            Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
            Description: My business checking account
        PaymentTerms:
          description: The PaymentTerms value.
          allOf:
          - $ref: '#/components/schemas/PaymentTerm'
          example:
            Bills:
              Day: 1
              Type: DAYSAFTERBILLDATE
            Sales:
              Day: 1
              Type: DAYSAFTERBILLDATE
      type: object
      example:
        OrganisationID: 8be9db36-3598-4755-ba5c-c2dbc8c4a7a2
        APIKey: example
        Name: Food Sales
