              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /Items:
    summary: Manage inventory items
    description: Manage inventory items.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    post:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: updateOrCreateItems
      summary: Create or update items in bulk
      description: Creates new items or updates existing ones from the supplied request body and returns the stored resources
        in a Items response payload.
      parameters:
      - $ref: '#/components/parameters/summarizeErrors'
      - $ref: '#/components/parameters/unitdp'
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Success - return response of type Items array with newly created Item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
              example:
                Id: ae7ef7c8-9024-4d42-8d59-5f26ed3f508b
                Status: OK
                ProviderName: Provider Name Example
                DateTimeUTC: /Date(1552331871904)/
                Items:
                - ItemID: a4544d51-48f6-441f-a623-99ecbced6ab7
                  Code: abc65591
                  Description: foobar
                  UpdatedDateUTC: /Date(1552331871707)/
                  PurchaseDetails: {}
                  SalesDetails: {}
                  Name: Hello11350
                  IsTrackedAsInventory: false
                  IsSold: true
                  IsPurchased: true
                  ValidationErrors:
                  - Message: Price List Item with Code ''abc'' already exists
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Items'
            example:
              Items:
              - Code: ItemCode123
                Name: ItemName XYZ
                Description: Item Description ABC
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getItems
      summary: List items for the organisation
      description: Returns the organisation's items in a Items response payload. Use the available filtering, ordering, paging,
        or modified-since parameters when the endpoint exposes them.
      parameters:
      - $ref: '#/components/parameters/ifModifiedSince'
      - in: query
        name: where
        description: Filter by an any element
        example: IsSold==true
        schema:
          type: string
          example: example
      - in: query
        name: order
        description: Order by an any element
        example: Code ASC
        schema:
          type: string
          example: example
      - $ref: '#/components/parameters/unitdp'
      responses:
        '200':
          description: Success - return response of type Items array with all Item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
              example:
                Id: 8487e8d7-5fb3-4f02-b949-dec8f1e38182
                Status: OK
                ProviderName: Provider Name Example
                DateTimeUTC: /Date(1552331874897)/
                Items:
                - ItemID: c8c54d65-f3f2-452d-926e-bf450b12fb07
                  Code: '123'
                  Description: Guitars Fender Strat
                  UpdatedDateUTC: /Date(1551981476267+0000)/
                  PurchaseDetails: {}
                  SalesDetails:
                    UnitPrice: 5000.0
                    AccountCode: '200'
                    TaxType: OUTPUT2
                  Name: Guitars
                  IsTrackedAsInventory: false
                  IsSold: true
                  IsPurchased: false
                - ItemID: a4544d51-48f6-441f-a623-99ecbced6ab7
                  Code: abc65591
                  Description: Barfoo
                  UpdatedDateUTC: /Date(1552331873580+0000)/
                  PurchaseDetails: {}
                  SalesDetails: {}
                  Name: Hello11350
                  IsTrackedAsInventory: false
                  IsSold: true
                  IsPurchased: true
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
    put:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: createItems
      summary: Create items from request data
      description: Creates one or more items from the supplied request body and returns the created resources in a Items response
