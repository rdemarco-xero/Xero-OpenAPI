        AddressLine1: example
        AddressLine2: example
    BalanceDetails:
      description: An array to specify multiple currency balances of an account
      properties:
        Balance:
          description: The opening balances of the account. Debits are positive, credits are negative values
          type: number
          format: double
          example: 1.0
        CurrencyCode:
          description: The currency of the balance (Not required for base currency)
          type: string
          example: NZD
        CurrencyRate:
          description: (Optional) Exchange rate to base currency when money is spent or received. If not specified, XE rate
            for the day is applied
          type: number
          format: double
          example: 1.0
      type: object
      example:
        Balance: 1.0
        CurrencyCode: NZD
        CurrencyRate: 1.0
    Bill:
      description: Represents the Bill schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/organisation/
      properties:
        Day:
          description: Day of Month (0-31)
          type: integer
          example: 1
        Type:
          description: The Type value.
          allOf:
          - $ref: '#/components/schemas/PaymentTermType'
          example: DAYSAFTERBILLDATE
      type: object
      example:
        Day: 1
        Type: DAYSAFTERBILLDATE
    BrandingTheme:
      description: Represents the BrandingTheme schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/branding-themes/
      properties:
        BrandingThemeID:
          description: Xero identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Name:
          description: Name of branding theme
          type: string
          example: Food Sales
        LogoUrl:
          description: The location of the image file used as the logo on this branding theme
          type: string
          example: https://api.xero.com/example
        Type:
          description: Always INVOICE
          type: string
          enum:
          - INVOICE
          example: ValidationException
        SortOrder:
          description: Integer ΓÇô ranked order of branding theme. The default branding theme has a value of 0
          type: integer
          example: 1
        CreatedDateUTC:
          description: UTC timestamp of creation date of branding theme
          type: string
          example: /Date(1573755038314)/
          readOnly: true
      type: object
      example:
        BrandingThemeID: 00000000-0000-0000-0000-000000000000
        Name: Food Sales
        LogoUrl: https://api.xero.com/example
    BrandingThemes:
      description: Represents the BrandingThemes schema used by the Accounting API.
      type: object
      properties:
        BrandingThemes:
          description: The BrandingThemes value.
          type: array
          items:
            $ref: '#/components/schemas/BrandingTheme'
          example:
          - BrandingThemeID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
            LogoUrl: https://api.xero.com/example
      example:
        BrandingThemes:
        - BrandingThemeID: 00000000-0000-0000-0000-000000000000
          Name: Food Sales
          LogoUrl: https://api.xero.com/example
    CISOrgSetting:
      description: Represents the CISOrgSetting schema used by the Accounting API.
      externalDocs:
        url: https://developer.xero.com/documentation/api/organisation
      properties:
        CISContractorEnabled:
          description: true or false - Boolean that describes if the organisation is a CIS Contractor
          type: boolean
          example: false
        CISSubContractorEnabled:
          description: true or false - Boolean that describes if the organisation is a CIS SubContractor
          type: boolean
          example: false
        Rate:
          description: CIS Deduction rate for the organisation
          type: number
          format: double
          readOnly: true
          example: 1.0
      example:
        CISContractorEnabled: false
        CISSubContractorEnabled: false
        Rate: 1.0
    CISOrgSettings:
      description: Represents the CISOrgSettings schema used by the Accounting API.
      type: object
      properties:
        CISSettings:
          description: The CISSettings value.
          type: array
          items:
            $ref: '#/components/schemas/CISOrgSetting'
          example:
          - CISContractorEnabled: false
            CISSubContractorEnabled: false
            Rate: 1.0
      example:
        CISSettings:
        - CISContractorEnabled: false
          CISSubContractorEnabled: false
          Rate: 1.0
    CISSetting:
      description: Represents the CISSetting schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/contacts/
      properties:
        CISEnabled:
          description: Boolean that describes if the contact is a CIS Subcontractor
          type: boolean
          example: false
        Rate:
          description: CIS Deduction rate for the contact if he is a subcontractor. If the contact is not CISEnabled, then
            the rate is not returned
          type: number
          format: double
          readOnly: true
          example: 1.0
      example:
        CISEnabled: false
        Rate: 1.0
    CISSettings:
      description: Represents the CISSettings schema used by the Accounting API.
      type: object
      properties:
        CISSettings:
          description: The CISSettings value.
          type: array
          items:
            $ref: '#/components/schemas/CISSetting'
          example:
          - CISEnabled: false
            Rate: 1.0
      example:
        CISSettings:
        - CISEnabled: false
          Rate: 1.0
    ConversionBalances:
      description: Balance supplied for each account that has a value as at the conversion date.
      properties:
        AccountCode:
          description: The account code for a account
          type: string
          example: 090
        Balance:
