          readOnly: true
          type: boolean
          example: false
        DisplayTaxRate:
          description: Tax Rate (decimal to 4dp) e.g 12.5000
          readOnly: true
          type: number
          format: double
          example: 1.0
        EffectiveRate:
          description: Effective Tax Rate (decimal to 4dp) e.g 12.5000
          readOnly: true
          type: number
          format: double
          example: 1.0
      type: object
      example:
        Name: Food Sales
        TaxType: INPUT2
        TaxComponents:
        - Name: Food Sales
          Rate: 1.0
          IsCompound: false
    TaxRates:
      description: Represents the TaxRates schema used by the Accounting API.
      type: object
      properties:
        TaxRates:
          description: The TaxRates value.
          type: array
          items:
            $ref: '#/components/schemas/TaxRate'
          example:
          - Name: Food Sales
            TaxType: INPUT2
            TaxComponents:
            - Name: Food Sales
              Rate: 1.0
              IsCompound: false
      example:
        TaxRates:
        - Name: Food Sales
          TaxType: INPUT2
          TaxComponents:
          - Name: Food Sales
            Rate: 1.0
            IsCompound: false
