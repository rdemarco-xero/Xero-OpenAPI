          type: string
          enum:
          - DEFAULT
          - DDI
          - MOBILE
          - FAX
          - OFFICE
          example: DEFAULT
        PhoneNumber:
          description: max length = 50
          maxLength: 50
          type: string
          example: 555-1234
        PhoneAreaCode:
          description: max length = 10
          maxLength: 10
