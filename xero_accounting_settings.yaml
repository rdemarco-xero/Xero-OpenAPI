openapi: 3.0.0
info:
  title: Xero Accounting API
  description: The Xero Accounting API exposes accounting resources for working with contacts, transactions, reports, settings,
    and related organisation data.
  version: 12.0.0
  termsOfService: https://developer.xero.com/xero-developer-platform-terms-conditions/
  contact:
    name: Xero Platform Team
    email: api@xero.com
    url: https://developer.xero.com
servers:
- description: The Xero Accounting API exposes accounting and related functions of the main Xero application and can be used
    for a variety of purposes such as creating transactions like invoices and credit notes, right through to extracting accounting
    data via our reports endpoint.
  url: https://api.xero.com/api.xro/2.0
tags:
- name: Accounting
  description: Core accounting resources including accounts, invoices, contacts, payments, and reports.
- name: Settings
  description: Company settings and configuration resources such as tax rates, tracking categories, and payment services.
paths:
  /Accounts:
    summary: Manage chart of accounts entries
    description: Manage chart of accounts entries.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getAccounts
      summary: List chart of accounts for the organisation
      description: Returns the organisation's chart of accounts in a Accounts response payload. Use the available filtering,
        ordering, paging, or modified-since parameters when the endpoint exposes them.
      parameters:
      - $ref: '#/components/parameters/ifModifiedSince'
      - in: query
        name: where
        description: Filter by an any element
        example: Status==&quot;ACTIVE&quot; AND Type==&quot;BANK&quot;
        schema:
          type: string
          example: example
      - in: query
        name: order
        description: Order by an any element
        example: Name ASC
        schema:
          type: string
          example: example
      responses:
        '200':
          description: Success - return response of type Accounts array with 0 to n Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accounts'
              example:
                Accounts:
                - AccountID: ebd06280-af70-4bed-97c6-7451a454ad85
                  Code: 091
                  Name: Business Savings Account
                  Type: BANK
                  TaxType: NONE
                  EnablePaymentsToAccount: false
                  BankAccountNumber: 0209087654321050
                  BankAccountType: BANK
                  CurrencyCode: NZD
                - AccountID: 7d05a53d-613d-4eb2-a2fc-dcb6adb80b80
                  Code: '200'
                  Name: Sales
                  Type: REVENUE
                  TaxType: OUTPUT2
                  Description: Income from any normal business activity
                  EnablePaymentsToAccount: false
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
    put:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: createAccount
      summary: Create accounts from request data
      description: Creates one or more accounts from the supplied request body and returns the created resources in a Accounts
        response payload.
      parameters:
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Success - created new Account and return response of type Accounts array with new Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accounts'
              example:
                Id: 11814c9d-3b5e-492e-93b0-fad16bf3244f
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550793549392)/
                Accounts:
                - AccountID: 66b262e2-561e-423e-8937-47d558f13442
                  Code: '123456'
                  Name: Foobar
                  Status: ACTIVE
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Hello World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550793549320+0000)/
        '400':
          description: Validation Error - some data was incorrect returns response of type Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                ErrorNumber: 10
                Type: ValidationException
                Message: A validation exception occurred
                Elements:
                - AccountID: 00000000-0000-0000-0000-000000000000
                  Code: '123456'
                  Name: Foobar
                  Type: EXPENSE
                  Description: Hello World
                  ValidationErrors:
                  - Message: Please enter a unique Name.
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        description: Account object in body of request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
            example:
              Code: '123456'
              Name: Foobar
              Type: EXPENSE
              Description: Hello World
  /Accounts/{AccountID}:
    summary: Retrieve or update a specific account
    description: Retrieve or update a specific account.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    post:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: updateAccount
      summary: Update the specified account record
      description: Updates the specified account with the supplied fields and returns the persisted resource in a Accounts
        response payload.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Success - update existing Account and return response of type Accounts array with updated Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accounts'
              example:
                Id: 9012e75c-ec08-40a9-ae15-153fc1f35c4d
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550795389340)/
                Accounts:
                - AccountID: 99ce6032-0678-4aa0-8148-240c75fee33a
                  Code: '654321'
                  Name: BarFoo
                  Status: ACTIVE
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Good Bye World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550795389333+0000)/
        '400':
          description: Validation Error - some data was incorrect returns response of type Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                ErrorNumber: 10
                Type: ValidationException
                Message: A validation exception occurred
                Elements:
                - AccountID: 00000000-0000-0000-0000-000000000000
                  Code: '123456'
                  Name: Foobar
                  Type: EXPENSE
                  Description: Hello World
                  ValidationErrors:
                  - Message: Please enter a unique Name.
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        description: Request of type Accounts array with one Account
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Accounts'
            example:
              Accounts:
              - Code: '123456'
                Name: BarFoo
                AccountID: 99ce6032-0678-4aa0-8148-240c75fee33a
                Type: EXPENSE
                Description: GoodBye World
                TaxType: INPUT
                EnablePaymentsToAccount: false
                ShowInExpenseClaims: false
                Class: EXPENSE
                ReportingCode: EXP
                ReportingCodeName: Expense
                UpdatedDateUTC: '2019-02-21T16:29:47.96-08:00'
    delete:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: deleteAccount
      summary: Delete the specified account record
      description: Deletes the specified account and returns the resulting resource state or confirmation payload in a Accounts
        response payload.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Success - delete existing Account and return response of type Accounts array with deleted Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accounts'
              example:
                Id: 76bb0543-8efe-4acc-b7f6-67dfcdec37b4
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550798217216)/
                Accounts:
                - AccountID: 7f3c0bec-f3e7-4073-b4d6-cc56dd027ef1
                  Code: '123456'
                  Name: FooBar
                  Status: DELETED
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Hello World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550798217210+0000)/
        '400':
          description: Validation Error - some data was incorrect returns response of type Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                ErrorNumber: 10
                Type: ValidationException
                Message: A validation exception occurred
                Elements:
                - AccountID: 00000000-0000-0000-0000-000000000000
                  Code: '123456'
                  Name: Foobar
                  Type: EXPENSE
                  Description: Hello World
                  ValidationErrors:
                  - Message: Please enter a unique Name.
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getAccount
      summary: Get an account by account ID
      description: Returns the account identified by the supplied account ID in a Accounts response payload.
      parameters:
      - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Success - return response of type Accounts array with one Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accounts'
              example:
                Id: 323455cc-9511-4451-a873-248d2983f38e
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550797359081)/
                Accounts:
                - AccountID: 99ce6032-0678-4aa0-8148-240c75fee33a
                  Code: '123456'
                  Name: FooBar
                  Status: ACTIVE
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Hello World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550797359120+0000)/
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /BrandingThemes:
    summary: Manage branding themes for invoices and documents
    description: Manage branding themes for invoices and documents.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getBrandingThemes
      summary: List branding themes for the organisation
      description: Returns the organisation's branding themes in a Branding Themes response payload. Use the available filtering,
        ordering, paging, or modified-since parameters when the endpoint exposes them.
      responses:
        '200':
          description: Success - return response of type BrandingThemes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandingThemes'
              example:
                Id: d1a1beea-bdfe-4ee4-9dbc-27226a26cd68
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550881711906)/
                BrandingThemes:
                - BrandingThemeID: dabc7637-62c1-4941-8a6e-ee44fa5090e7
                  Name: Standard
                  SortOrder: 0
                  CreatedDateUTC: /Date(1464967643813+0000)/
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /BrandingThemes/{BrandingThemeID}:
    summary: Retrieve or update a specific branding theme
    description: Retrieve or update a specific branding theme.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getBrandingTheme
      summary: Get a branding theme by branding theme ID
      description: Returns the branding theme identified by the supplied branding theme ID in a Branding Themes response payload.
      parameters:
      - $ref: '#/components/parameters/BrandingThemeID'
      responses:
        '200':
          description: Success - return response of type BrandingThemes with one BrandingTheme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandingThemes'
              example:
                Id: df671650-cf14-4a7f-b609-4166933719bc
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550881713071)/
                BrandingThemes:
                - BrandingThemeID: dabc7637-62c1-4941-8a6e-ee44fa5090e7
                  Name: Standard
                  SortOrder: 0
                  CreatedDateUTC: /Date(1464967643813+0000)/
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /Contacts/{ContactID}/CISSettings:
    summary: Retrieve CIS settings for a specific contact
    description: Retrieve CIS settings for a specific contact.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      - Contacts
      operationId: getContactCISSettings
      summary: Get CIS settings for a contact
      description: Returns Construction Industry Scheme settings for the specified contact, including the configured tax treatment
        fields, in a CISSettings response payload.
      parameters:
      - $ref: '#/components/parameters/ContactID'
      responses:
        '200':
          description: Success - return response of type CISSettings for a specific Contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CISSettings'
              example:
                CISSetting:
                - CISContractorEnabled: true
                  CISSubContractorEnabled: true
                  Rate: 100
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
  /Currencies:
    summary: Manage currencies used by the organisation
    description: Manage currencies used by the organisation.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getCurrencies
      summary: List currencies for the organisation
      description: Returns the organisation's currencies in a Currencies response payload. Use the available filtering, ordering,
        paging, or modified-since parameters when the endpoint exposes them.
      parameters:
      - in: query
        name: where
        description: Filter by an any element
        example: Code=="USD"
        schema:
          type: string
          example: example
      - in: query
        name: order
        description: Order by an any element
        example: Code ASC
        schema:
          type: string
          example: example
      responses:
        '200':
          description: Success - return response of type Currencies array with all Currencies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Currencies'
              example:
                Id: e6803fc8-8035-4251-b3e4-39d6b2de0f4a
                Status: OK
                ProviderName: Provider Name Example
                DateTimeUTC: /Date(1552322853043)/
                Currencies:
                - Code: NZD
                  Description: New Zealand Dollar
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
    put:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: createCurrency
      summary: Create a new currency record
      description: Creates a new currency from the supplied request body and returns the created resource in a Currencies
        response payload.
      parameters:
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Unsupported - return response incorrect exception, API is not able to create new Currency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Currencies'
              example:
                Currencies:
                - Code: USD
                  Description: United States Dollar
        '400':
          $ref: '#/components/responses/400Error'
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        description: Currency object in the body of request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Currency'
            example:
              Code: USD
              Description: United States Dollar
  /InvoiceReminders/Settings:
