          description: Unique ID for batch payment object with validation error
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        BankTransactionID:
          description: The BankTransactionID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        CreditNoteID:
          description: The CreditNoteID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ContactID:
          description: The ContactID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        InvoiceID:
          description: The InvoiceID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ItemID:
          description: The ItemID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        PurchaseOrderID:
          description: The PurchaseOrderID value.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
