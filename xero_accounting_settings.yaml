components:
  parameters:
    AccountID:
      required: true
      in: path
      name: AccountID
      description: Unique identifier for Account object
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    BrandingThemeID:
      required: true
      in: path
      name: BrandingThemeID
      description: Unique identifier for a Branding Theme
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    ContactID:
      required: true
      in: path
      name: ContactID
      description: Unique identifier for a Contact
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    ItemID:
      required: true
      in: path
      name: ItemID
      description: Unique identifier for an Item
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    OrganisationID:
      required: true
      in: path
      name: OrganisationID
      description: The unique Xero identifier for an organisation
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    TaxType:
      required: true
      in: path
      name: TaxType
      description: A valid TaxType code
      example: INPUT2
      schema:
        type: string
        example: INPUT2
    TrackingCategoryID:
      required: true
      in: path
      name: TrackingCategoryID
      description: Unique identifier for a TrackingCategory
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    TrackingOptionID:
      required: true
      in: path
      name: TrackingOptionID
      description: Unique identifier for a Tracking Option
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    UserID:
      required: true
      in: path
      name: UserID
      description: Unique identifier for a User
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    idempotencyKey:
      in: header
      name: Idempotency-Key
      description: This allows you to safely retry requests without the risk of duplicate processing. 128 character max.
      example: KEY_VALUE
      schema:
        type: string
        example: KEY_VALUE
    ifModifiedSince:
      in: header
      name: If-Modified-Since
      description: Only records created or modified since this timestamp will be returned
      example: '2020-02-06T12:17:43.202-08:00'
      schema:
        type: string
        format: date-time
        example: '2020-02-06T12:17:43.202-08:00'
    requiredHeader:
      in: header
      name: xero-tenant-id
      description: Xero identifier for Tenant
      example: YOUR_XERO_TENANT_ID
      schema:
        type: string
        example: YOUR_XERO_TENANT_ID
      required: true
    summarizeErrors:
      in: query
      name: summarizeErrors
      description: If false return 200 OK and mix of successfully created objects and any with validation errors
      example: true
      schema:
        type: boolean
        default: false
        example: true
    unitdp:
      in: query
      name: unitdp
      description: e.g. unitdp=4 ΓÇô (Unit Decimal Places) You can opt in to use four decimal places for unit amounts
      example: 4
      schema:
        type: integer
        example: 4
  requestBodies:
    historyRecords:
      required: true
      description: HistoryRecords containing an array of HistoryRecord objects in body of request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HistoryRecords'
          example:
            HistoryRecords:
            - Details: Hello World
  responses:
    400Error:
      description: A failed request due to validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    429Error:
      description: Too Many Requests - The rate limit has been exceeded.
      headers:
        Retry-After:
          description: The number of seconds to wait before retrying the request.
          schema:
            type: integer
            example: 5
        xero-correlation-id:
          description: A unique identifier for the request, useful for troubleshooting with support.
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
      content: {}
    500Error:
      description: Internal Server Error - An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            Title: An error occurred
            Detail: An error occurred in Xero. Check the API Status page http://status.developer.xero.com for current service
              status.
            Status: 500
            Instance: 6964b201-1442-41f2-b22f-1e34f5baab08
    HistoryRecordCreated:
      description: Success - return response of type HistoryRecords array of HistoryRecord objects
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HistoryRecords'
          example:
            Id: d7525479-3392-44c0-bb37-ff4a0b5df5bd
            Status: OK
            ProviderName: Xero API Partner
            DateTimeUTC: /Date(1550899400362)/
            HistoryRecords:
            - DateUTCString: 2019-02-23 05:23:20
              DateUTC: /Date(1550899400362)/
              Details: Hello World
              ValidationErrors: []
    HistoryRetrieved:
      description: Success - return response of HistoryRecords array of 0 to N HistoryRecord
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HistoryRecords'
          example:
            Id: cd54cc7b-b721-4207-b11d-7d13c7902f91
            Status: OK
            ProviderName: Xero API Partner
            DateTimeUTC: /Date(1551311321819)/
            HistoryRecords:
            - Changes: Attached a file
              DateUTCString: 2018-11-08 15:01:21
              DateUTC: /Date(1541689281470+0000)/
              User: System Generated
              Details: Attached the file sample2.jpg through the Xero API using Xero API Partner
            - Changes: Credit Applied
              DateUTCString: 2016-10-17 20:46:01
              DateUTC: /Date(1476737161173+0000)/
              User: System Generated
              Details: Bank transfer from Business Wells Fargo to My Savings on November 12, 2016 for 20.00.
  schemas:
    Account:
      description: Represents the Account schema used by the Accounting API.
      type: object
      externalDocs:
        url: http://developer.xero.com/documentation/api/accounts/
      properties:
        Code:
          description: Customer defined alpha numeric account code e.g 200 or SALES (max length = 10)
          type: string
          example: 4400
        Name:
          description: Name of account (max length = 150)
          maxLength: 150
          type: string
          example: Food Sales
        AccountID:
          description: The Xero identifier for an account ΓÇô specified as a string following  the endpoint name   e.g. /297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Type:
          description: The Type value.
          allOf:
          - $ref: '#/components/schemas/AccountType'
          type: string
          example: BANK
        BankAccountNumber:
          description: For bank accounts only (Account Type BANK)
          type: string
          example: 123-456-1111111
        Status:
          description: Accounts with a status of ACTIVE can be updated to ARCHIVED. See Account Status Codes
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
          - DELETED
          example: ACTIVE
        Description:
          description: Description of the Account. Valid for all types of accounts except bank accounts (max length = 4000)
          type: string
          example: My business checking account
        BankAccountType:
          description: For bank accounts only. See Bank Account types
          type: string
          enum:
          - BANK
          - CREDITCARD
          - PAYPAL
          - NONE
          - ''
          example: BANK
        CurrencyCode:
          description: The CurrencyCode value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        TaxType:
          description: The tax type from taxRates
          type: string
          example: INPUT2
        EnablePaymentsToAccount:
          description: Boolean ΓÇô describes whether account can have payments applied to it
          type: boolean
          example: false
        ShowInExpenseClaims:
          description: Boolean ΓÇô describes whether account code is available for use with expense claims
          type: boolean
          example: false
        Class:
          description: See Account Class Types
          readOnly: true
          type: string
          enum:
          - ASSET
          - EQUITY
          - EXPENSE
          - LIABILITY
          - REVENUE
          example: ASSET
        SystemAccount:
          description: If this is a system account then this element is returned. See System Account types. Note that non-system
            accounts may have this element set as either ΓÇ£ΓÇ¥ or null.
          readOnly: true
          type: string
          enum:
          - DEBTORS
          - CREDITORS
          - BANKCURRENCYGAIN
          - GST
          - GSTONIMPORTS
          - HISTORICAL
          - REALISEDCURRENCYGAIN
          - RETAINEDEARNINGS
          - ROUNDING
          - TRACKINGTRANSFERS
          - UNPAIDEXPCLM
          - UNREALISEDCURRENCYGAIN
          - WAGEPAYABLES
          - CISASSETS
          - CISASSET
          - CISLABOUR
          - CISLABOUREXPENSE
          - CISLABOURINCOME
          - CISLIABILITY
          - CISMATERIALS
          - ''
          example: DEBTORS
        ReportingCode:
          description: Shown if set
          type: string
          example: ABC-123
        ReportingCodeName:
          description: Shown if set
          readOnly: true
          type: string
          example: Example Name
        HasAttachments:
          description: boolean to indicate if an account has an attachment (read only)
          readOnly: true
          type: boolean
          default: false
          example: false
        UpdatedDateUTC:
          description: Last modified date UTC format
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        AddToWatchlist:
          description: Boolean ΓÇô describes whether the account is shown in the watchlist widget on the dashboard
          type: boolean
          example: false
        ValidationErrors:
          description: Displays array of validation error messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
      example:
        Code: 4400
        Name: Food Sales
        AccountID: 00000000-0000-0000-0000-000000000000
    AccountType:
      description: See Account Types
      type: string
      enum:
      - BANK
      - CURRENT
      - CURRLIAB
      - DEPRECIATN
      - DIRECTCOSTS
      - EQUITY
      - EXPENSE
      - FIXED
      - INVENTORY
      - LIABILITY
      - NONCURRENT
      - OTHERINCOME
      - OVERHEADS
      - PREPAYMENT
      - REVENUE
      - SALES
      - TERMLIAB
      - PAYG
      example: BANK
    Accounts:
      description: Represents the Accounts schema used by the Accounting API.
      type: object
      properties:
        Accounts:
          description: The Accounts value.
          type: array
          items:
            $ref: '#/components/schemas/Account'
          example:
          - Code: 4400
            Name: Food Sales
            AccountID: 00000000-0000-0000-0000-000000000000
      example:
        Accounts:
        - Code: 4400
          Name: Food Sales
          AccountID: 00000000-0000-0000-0000-000000000000
    Action:
      description: Represents the Action schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/organisation/
      properties:
        Name:
          description: Name of the actions for this organisation
          type: string
          example: UseMulticurrency
        Status:
          description: Status of the action for this organisation
          type: string
          enum:
          - ALLOWED
          - NOT-ALLOWED
          example: ALLOWED
      example:
        Name: UseMulticurrency
        Status: ALLOWED
    Actions:
      description: Represents the Actions schema used by the Accounting API.
      type: object
      properties:
        Actions:
          description: The Actions value.
          type: array
          items:
            $ref: '#/components/schemas/Action'
          example:
          - Name: UseMulticurrency
            Status: ALLOWED
      example:
        Actions:
        - Name: UseMulticurrency
          Status: ALLOWED
    AddressForOrganisation:
      description: Represents the AddressForOrganisation schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/types
      properties:
        AddressType:
          description: define the type of address
          type: string
          enum:
          - POBOX
          - STREET
          - DELIVERY
          example: POBOX
        AddressLine1:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        AddressLine2:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        AddressLine3:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        AddressLine4:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        City:
          description: max length = 255
          maxLength: 255
          type: string
          example: example
        Region:
          description: max length = 255
          maxLength: 255
          type: string
          example: example
        PostalCode:
          description: max length = 50
          maxLength: 50
          type: string
          example: '10001'
        Country:
          description: max length = 50, [A-Z], [a-z] only
          maxLength: 50
          type: string
          example: US
