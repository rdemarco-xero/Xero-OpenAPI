    Purchase:
      description: Represents the Purchase schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/items/
      properties:
        UnitPrice:
          description: Unit Price of the item. By default UnitPrice is rounded to two decimal places. You can use 4 decimal
            places by adding the unitdp=4 querystring parameter to your request.
          type: number
          format: double
          example: 1.0
        AccountCode:
          description: Default account code to be used for purchased/sale. Not applicable to the purchase details of tracked
