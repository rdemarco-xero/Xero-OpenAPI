              DateUTC: /Date(1476737161173+0000)/
              User: System Generated
              Details: Bank transfer from Business Wells Fargo to My Savings on November 12, 2016 for 20.00.
  schemas:
    AccountsPayable:
      description: Represents the AccountsPayable schema used by the Accounting API.
      type: object
      properties:
        Outstanding:
          description: The Outstanding value.
          type: number
          format: double
          example: 1.0
        Overdue:
          description: The Overdue value.
          type: number
          format: double
          example: 1.0
      example:
        Outstanding: 1.0
        Overdue: 1.0
    AccountsReceivable:
      description: Represents the AccountsReceivable schema used by the Accounting API.
      type: object
      properties:
        Outstanding:
