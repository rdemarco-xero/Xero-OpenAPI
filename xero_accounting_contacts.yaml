components:
  parameters:
    ContactGroupID:
      required: true
      in: path
      name: ContactGroupID
      description: Unique identifier for a Contact Group
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    ContactID:
      required: true
      in: path
      name: ContactID
      description: Unique identifier for a Contact
      example: 00000000-0000-0000-0000-000000000000
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000000
    idempotencyKey:
      in: header
      name: Idempotency-Key
      description: This allows you to safely retry requests without the risk of duplicate processing. 128 character max.
      example: KEY_VALUE
      schema:
        type: string
        example: KEY_VALUE
    ifModifiedSince:
      in: header
      name: If-Modified-Since
      description: Only records created or modified since this timestamp will be returned
      example: '2020-02-06T12:17:43.202-08:00'
      schema:
        type: string
        format: date-time
        example: '2020-02-06T12:17:43.202-08:00'
    pageSize:
      in: query
      name: pageSize
      description: Number of records to retrieve per page
      example: 100
      schema:
        type: integer
        example: 100
    requiredHeader:
      in: header
      name: xero-tenant-id
      description: Xero identifier for Tenant
      example: YOUR_XERO_TENANT_ID
      schema:
        type: string
        example: YOUR_XERO_TENANT_ID
      required: true
    summarizeErrors:
      in: query
      name: summarizeErrors
      description: If false return 200 OK and mix of successfully created objects and any with validation errors
      example: true
      schema:
        type: boolean
        default: false
        example: true
    summaryOnly:
      in: query
      name: summaryOnly
      description: Use summaryOnly=true in GET Contacts and Invoices endpoint to retrieve a smaller version of the response
        object. This returns only lightweight fields, excluding computation-heavy fields from the response, making the API
        calls quick and efficient.
      example: true
      schema:
        type: boolean
        default: false
        example: true
  requestBodies:
    historyRecords:
      required: true
      description: HistoryRecords containing an array of HistoryRecord objects in body of request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HistoryRecords'
          example:
            HistoryRecords:
            - Details: Hello World
  responses:
    400Error:
      description: A failed request due to validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    429Error:
      description: Too Many Requests - The rate limit has been exceeded.
      headers:
        Retry-After:
          description: The number of seconds to wait before retrying the request.
          schema:
            type: integer
            example: 5
        xero-correlation-id:
          description: A unique identifier for the request, useful for troubleshooting with support.
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
      content: {}
    500Error:
      description: Internal Server Error - An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            Title: An error occurred
            Detail: An error occurred in Xero. Check the API Status page http://status.developer.xero.com for current service
              status.
            Status: 500
            Instance: 6964b201-1442-41f2-b22f-1e34f5baab08
    HistoryRecordCreated:
      description: Success - return response of type HistoryRecords array of HistoryRecord objects
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HistoryRecords'
          example:
            Id: d7525479-3392-44c0-bb37-ff4a0b5df5bd
            Status: OK
            ProviderName: Xero API Partner
            DateTimeUTC: /Date(1550899400362)/
            HistoryRecords:
            - DateUTCString: 2019-02-23 05:23:20
              DateUTC: /Date(1550899400362)/
              Details: Hello World
              ValidationErrors: []
