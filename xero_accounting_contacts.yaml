          type: string
          enum:
          - POBOX
          - STREET
          example: POBOX
        AddressLine1:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        AddressLine2:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        AddressLine3:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        AddressLine4:
          description: max length = 500
          maxLength: 500
          type: string
          example: example
        City:
          description: max length = 255
          maxLength: 255
          type: string
          example: example
        Region:
          description: max length = 255
          maxLength: 255
          type: string
          example: example
        PostalCode:
          description: max length = 50
          maxLength: 50
          type: string
          example: '10001'
        Country:
          description: max length = 50, [A-Z], [a-z] only
          maxLength: 50
          type: string
          example: US
        AttentionTo:
          description: max length = 255
          maxLength: 255
          type: string
          example: example
      type: object
      example:
        AddressType: POBOX
        AddressLine1: example
        AddressLine2: example
    Attachment:
      description: Represents the Attachment schema used by the Accounting API.
      type: object
      externalDocs:
        url: http://developer.xero.com/documentation/api/attachments/
      properties:
        AttachmentID:
          description: Unique ID for the file
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        FileName:
          description: Name of the file
          type: string
          example: xero-dev.jpg
        Url:
          description: URL to the file on xero.com
          type: string
          example: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        MimeType:
          description: Type of file
          type: string
          example: image/jpg
        ContentLength:
          description: Length of the file content
          type: integer
          example: 1
        IncludeOnline:
          description: Include the file with the online invoice
          type: boolean
          example: false
      example:
        AttachmentID: 00000000-0000-0000-0000-000000000000
        FileName: xero-dev.jpg
        Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
    Balances:
      type: object
      description: The raw AccountsReceivable(sales invoices) and AccountsPayable(bills) outstanding and overdue amounts,
        not converted to base currency (read only)
      properties:
        AccountsReceivable:
          description: The AccountsReceivable value.
          allOf:
          - $ref: '#/components/schemas/AccountsReceivable'
          example:
            Outstanding: 1.0
            Overdue: 1.0
        AccountsPayable:
          description: The AccountsPayable value.
          allOf:
          - $ref: '#/components/schemas/AccountsPayable'
          example:
            Outstanding: 1.0
            Overdue: 1.0
      example:
        AccountsReceivable:
          Outstanding: 1.0
          Overdue: 1.0
        AccountsPayable:
          Outstanding: 1.0
          Overdue: 1.0
    BatchPaymentDetails:
      description: Bank details for use on a batch payment stored with each contact
      externalDocs:
        url: http://developer.xero.com/documentation/api/Contact/
      properties:
        BankAccountNumber:
          description: Bank account number for use with Batch Payments
          type: string
          example: 123-456-1111111
        BankAccountName:
          description: Name of bank for use with Batch Payments
          type: string
          example: ACME Bank
        Details:
          description: (Non-NZ Only) These details are sent to the orgΓÇÖs bank as a reference for the batch payment transaction.
            They will also show with the batch payment transaction in the bank reconciliation Find & Match screen. Depending
            on your individual bank, the detail may also show on the bank statement imported into Xero. Maximum field length
            = 18
          type: string
          example: Hello World
        Code:
          description: (NZ Only) Optional references for the batch payment transaction. It will also show with the batch payment
            transaction in the bank reconciliation Find & Match screen. Depending on your individual bank, the detail may
            also show on the bank statement you import into Xero.
          type: string
          maxLength: 12
          example: ABC
        Reference:
          description: (NZ Only) Optional references for the batch payment transaction. It will also show with the batch payment
            transaction in the bank reconciliation Find & Match screen. Depending on your individual bank, the detail may
            also show on the bank statement you import into Xero.
          type: string
          maxLength: 12
          example: Foobar
      example:
        BankAccountNumber: 123-456-1111111
        BankAccountName: ACME Bank
        Details: Hello World
    Bill:
      description: Represents the Bill schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/organisation/
      properties:
        Day:
          description: Day of Month (0-31)
          type: integer
          example: 1
        Type:
          description: The Type value.
          allOf:
          - $ref: '#/components/schemas/PaymentTermType'
          example: DAYSAFTERBILLDATE
      type: object
      example:
        Day: 1
        Type: DAYSAFTERBILLDATE
    BrandingTheme:
      description: Represents the BrandingTheme schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/branding-themes/
      properties:
        BrandingThemeID:
          description: Xero identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Name:
          description: Name of branding theme
          type: string
          example: Food Sales
        LogoUrl:
          description: The location of the image file used as the logo on this branding theme
          type: string
          example: https://api.xero.com/example
        Type:
          description: Always INVOICE
          type: string
          enum:
          - INVOICE
          example: ValidationException
        SortOrder:
          description: Integer ΓÇô ranked order of branding theme. The default branding theme has a value of 0
          type: integer
          example: 1
        CreatedDateUTC:
          description: UTC timestamp of creation date of branding theme
          type: string
          example: /Date(1573755038314)/
          readOnly: true
      type: object
      example:
        BrandingThemeID: 00000000-0000-0000-0000-000000000000
        Name: Food Sales
        LogoUrl: https://api.xero.com/example
    CISSetting:
      description: Represents the CISSetting schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/contacts/
      properties:
        CISEnabled:
          description: Boolean that describes if the contact is a CIS Subcontractor
          type: boolean
          example: false
        Rate:
          description: CIS Deduction rate for the contact if he is a subcontractor. If the contact is not CISEnabled, then
            the rate is not returned
          type: number
          format: double
          readOnly: true
          example: 1.0
      example:
        CISEnabled: false
        Rate: 1.0
    CISSettings:
      description: Represents the CISSettings schema used by the Accounting API.
      type: object
      properties:
        CISSettings:
          description: The CISSettings value.
          type: array
          items:
            $ref: '#/components/schemas/CISSetting'
          example:
          - CISEnabled: false
            Rate: 1.0
      example:
        CISSettings:
        - CISEnabled: false
          Rate: 1.0
    Contact:
      description: Represents the Contact schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/contacts/
      properties:
        ContactID:
          description: Xero identifier
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        MergedToContactID:
          description: ID for the destination of a merged contact. Only returned when using paging or when fetching a contact
            by ContactId or ContactNumber.
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        ContactNumber:
          description: This can be updated via the API only i.e. This field is read only on the Xero contact screen, used
            to identify contacts in external systems (max length = 50). If the Contact Number is used, this is displayed as
            Contact Code in the Contacts UI in Xero.
          maxLength: 50
          type: string
          example: '12345'
        AccountNumber:
          description: A user defined account number. This can be updated via the API and the Xero UI (max length = 50)
          maxLength: 50
          type: string
          example: '12345'
        ContactStatus:
          description: Current status of a contact ΓÇô see contact status types
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
          - GDPRREQUEST
          example: ACTIVE
        Name:
          description: Full name of contact/organisation (max length = 255)
          maxLength: 255
          type: string
          example: Food Sales
        FirstName:
          description: First name of contact person (max length = 255)
          maxLength: 255
          type: string
          example: John
        LastName:
          description: Last name of contact person (max length = 255)
          maxLength: 255
          type: string
          example: Doe
        CompanyNumber:
          description: Company registration number (max length = 50)
          maxLength: 50
          type: string
          example: '12345'
        EmailAddress:
          description: Email address of contact person (umlauts not supported) (max length  = 255)
          maxLength: 255
          type: string
          example: user@example.com
        ContactPersons:
          description: See contact persons
          type: array
          items:
            $ref: '#/components/schemas/ContactPerson'
          example:
          - FirstName: John
            LastName: Doe
            EmailAddress: user@example.com
        BankAccountDetails:
          description: Bank account number of contact
          type: string
          example: Example details
        TaxNumber:
          description: Tax number of contact ΓÇô this is also known as the ABN (Australia), GST Number (New Zealand), VAT
            Number (UK) or Tax ID Number (US and global) in the Xero UI depending on which regionalized version of Xero you
            are using (max length = 50)
          maxLength: 50
          type: string
          example: '12345'
        TaxNumberType:
          description: Identifier of the regional type of tax number, such as US, UK, or other regional tax identifiers
          type: string
          enum:
          - SSN
          - EIN
          - ITIN
          - ATIN
          example: SSN
        AccountsReceivableTaxType:
          description: The tax type from TaxRates
          type: string
          example: ExampleType
        AccountsPayableTaxType:
          description: The tax type from TaxRates
          type: string
          example: ExampleType
        Addresses:
          description: Store certain address types for a contact ΓÇô see address types
          type: array
          items:
            $ref: '#/components/schemas/Address'
          example:
          - AddressType: POBOX
            AddressLine1: example
            AddressLine2: example
        Phones:
          description: Store certain phone types for a contact ΓÇô see phone types
          type: array
          items:
            $ref: '#/components/schemas/Phone'
          example:
          - PhoneType: DEFAULT
            PhoneNumber: 555-1234
            PhoneAreaCode: ABC-123
        IsSupplier:
          description: true or false ΓÇô Boolean that describes if a contact that has any AP  invoices entered against them.
            Cannot be set via PUT or POST ΓÇô it is automatically set when an accounts payable invoice is generated against
            this contact.
          type: boolean
          example: false
        IsCustomer:
          description: true or false ΓÇô Boolean that describes if a contact has any AR invoices entered against them. Cannot
            be set via PUT or POST ΓÇô it is automatically set when an accounts receivable invoice is generated against this
            contact.
          type: boolean
          example: false
        SalesDefaultLineAmountType:
          description: The default sales line amount type for a contact. Only available when summaryOnly parameter or paging
            is used, or when fetch by ContactId or ContactNumber.
          type: string
          enum:
          - INCLUSIVE
          - EXCLUSIVE
          - NONE
          example: INCLUSIVE
        PurchasesDefaultLineAmountType:
          description: The default purchases line amount type for a contact Only available when summaryOnly parameter or paging
            is used, or when fetch by ContactId or ContactNumber.
          type: string
          enum:
          - INCLUSIVE
          - EXCLUSIVE
          - NONE
          example: INCLUSIVE
        DefaultCurrency:
          description: The DefaultCurrency value.
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          type: string
          example: AED
        XeroNetworkKey:
          description: Store XeroNetworkKey for contacts.
          type: string
          example: example
        SalesDefaultAccountCode:
          description: The default sales account code for contacts
          type: string
          example: ABC-123
        PurchasesDefaultAccountCode:
          description: The default purchases account code for contacts
          type: string
          example: ABC-123
        SalesTrackingCategories:
          description: The default sales tracking categories for contacts
          type: array
          items:
            $ref: '#/components/schemas/SalesTrackingCategory'
          example:
          - TrackingCategoryName: Example Name
            TrackingOptionName: Example Name
        PurchasesTrackingCategories:
          description: The default purchases tracking categories for contacts
          type: array
          items:
            $ref: '#/components/schemas/SalesTrackingCategory'
          example:
          - TrackingCategoryName: Example Name
            TrackingOptionName: Example Name
        TrackingCategoryName:
          description: The name of the Tracking Category assigned to the contact under SalesTrackingCategories and PurchasesTrackingCategories
          type: string
          example: Example Name
        TrackingCategoryOption:
          description: The name of the Tracking Option assigned to the contact under SalesTrackingCategories and PurchasesTrackingCategories
          type: string
          example: example
        PaymentTerms:
          description: The PaymentTerms value.
          allOf:
          - $ref: '#/components/schemas/PaymentTerm'
          example:
            Bills:
              Day: 1
              Type: DAYSAFTERBILLDATE
            Sales:
              Day: 1
              Type: DAYSAFTERBILLDATE
        UpdatedDateUTC:
          description: UTC timestamp of last update to contact
          type: string
          example: /Date(1573755038314)/
          readOnly: true
        ContactGroups:
          description: Displays which contact groups a contact is included in
          type: array
          items:
            $ref: '#/components/schemas/ContactGroup'
          example:
          - Name: Food Sales
            Status: ACTIVE
            ContactGroupID: 00000000-0000-0000-0000-000000000000
        Website:
          description: Website address for contact (read only)
          readOnly: true
          type: string
          example: example
        BrandingTheme:
          description: The BrandingTheme value.
          allOf:
          - $ref: '#/components/schemas/BrandingTheme'
          example:
            BrandingThemeID: 00000000-0000-0000-0000-000000000000
            Name: Food Sales
            LogoUrl: https://api.xero.com/example
        BatchPayments:
          description: The BatchPayments value.
          allOf:
          - $ref: '#/components/schemas/BatchPaymentDetails'
          example:
            BankAccountNumber: 123-456-1111111
            BankAccountName: ACME Bank
            Details: Hello World
        Discount:
          description: The default discount rate for the contact (read only)
          readOnly: true
          type: number
          format: double
          example: 1.0
        Balances:
          description: The Balances value.
          allOf:
          - $ref: '#/components/schemas/Balances'
          example:
            AccountsReceivable:
              Outstanding: 1.0
              Overdue: 1.0
            AccountsPayable:
              Outstanding: 1.0
              Overdue: 1.0
        Attachments:
          description: Displays array of attachments from the API
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          example:
          - AttachmentID: 00000000-0000-0000-0000-000000000000
            FileName: xero-dev.jpg
            Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
        HasAttachments:
          description: A boolean to indicate if a contact has an attachment
          type: boolean
          default: false
          example: false
        ValidationErrors:
          description: Displays validation errors returned from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        HasValidationErrors:
          description: A boolean to indicate if a contact has an validation errors
          type: boolean
          default: false
          example: false
        StatusAttributeString:
          description: Status of object
          type: string
          example: ERROR
      type: object
      example:
        ContactID: 00000000-0000-0000-0000-000000000000
        MergedToContactID: 00000000-0000-0000-0000-000000000000
        ContactNumber: '12345'
    ContactGroup:
      description: Represents the ContactGroup schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/contactgroups/
      properties:
        Name:
          description: The Name of the contact group. Required when creating a new contact  group
          type: string
          example: Food Sales
        Status:
          description: The Status of a contact group. To delete a contact group update the status to DELETED. Only contact
            groups with a status of ACTIVE are returned on GETs.
          type: string
          enum:
          - ACTIVE
          - DELETED
          example: ACTIVE
        ContactGroupID:
          description: The Xero identifier for an contact group ΓÇô specified as a string following the endpoint name. e.g.
            /297c2dc5-cc47-4afd-8ec8-74990b8761e9
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        Contacts:
          description: The ContactID and Name of Contacts in a contact group. Returned on GETs when the ContactGroupID is
            supplied in the URL.
          type: array
          items:
            $ref: '#/components/schemas/Contact'
          example:
          - ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
      type: object
      example:
        Name: Food Sales
        Status: ACTIVE
        ContactGroupID: 00000000-0000-0000-0000-000000000000
    ContactGroups:
      description: Represents the ContactGroups schema used by the Accounting API.
      type: object
      properties:
        ContactGroups:
          description: The ContactGroups value.
          type: array
          items:
            $ref: '#/components/schemas/ContactGroup'
          example:
          - Name: Food Sales
            Status: ACTIVE
            ContactGroupID: 00000000-0000-0000-0000-000000000000
      example:
        ContactGroups:
        - Name: Food Sales
          Status: ACTIVE
          ContactGroupID: 00000000-0000-0000-0000-000000000000
    ContactPerson:
      description: Represents the ContactPerson schema used by the Accounting API.
      externalDocs:
        url: http://developer.xero.com/documentation/api/contacts/
      properties:
        FirstName:
          description: First name of person
          type: string
          example: John
        LastName:
          description: Last name of person
          type: string
          example: Doe
        EmailAddress:
          description: Email address of person
          type: string
          example: user@example.com
        IncludeInEmails:
          description: boolean to indicate whether contact should be included on emails with invoices etc.
          type: boolean
          example: user@example.com
      type: object
      example:
        FirstName: John
        LastName: Doe
        EmailAddress: user@example.com
    Contacts:
      description: Represents the Contacts schema used by the Accounting API.
      type: object
      properties:
        pagination:
          description: The pagination value.
          allOf:
          - $ref: '#/components/schemas/Pagination'
          example:
            page: 1
            pageSize: 100
            pageCount: 1
        Warnings:
          description: Displays array of warning messages from the API
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          example:
          - Message: One or more validation errors occurred.
        Contacts:
          description: The Contacts value.
          type: array
          items:
            $ref: '#/components/schemas/Contact'
          example:
          - ContactID: 00000000-0000-0000-0000-000000000000
            MergedToContactID: 00000000-0000-0000-0000-000000000000
            ContactNumber: '12345'
      example:
        pagination:
          page: 1
          pageSize: 100
          pageCount: 1
        Warnings:
        - Message: One or more validation errors occurred.
        Contacts:
        - ContactID: 00000000-0000-0000-0000-000000000000
          MergedToContactID: 00000000-0000-0000-0000-000000000000
          ContactNumber: '12345'
