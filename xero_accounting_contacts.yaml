openapi: 3.0.0
info:
  title: Xero Accounting API
  description: The Xero Accounting API exposes accounting resources for working with contacts, transactions, reports, settings,
    and related organisation data.
  version: 12.0.0
  termsOfService: https://developer.xero.com/xero-developer-platform-terms-conditions/
  contact:
    name: Xero Platform Team
    email: api@xero.com
    url: https://developer.xero.com
servers:
- description: The Xero Accounting API exposes accounting and related functions of the main Xero application and can be used
    for a variety of purposes such as creating transactions like invoices and credit notes, right through to extracting accounting
    data via our reports endpoint.
  url: https://api.xero.com/api.xro/2.0
tags:
- name: Accounting
  description: Core accounting resources including accounts, invoices, contacts, payments, and reports.
- name: Contacts
  description: Contact and contact-group resources, including CIS and contact-level metadata endpoints.
paths:
  /Contacts:
    summary: Manage contacts including customers and suppliers
    description: Manage contacts including customers and suppliers.
    parameters:
    - $ref: '#/components/parameters/requiredHeader'
    post:
      security:
      - OAuth2:
        - accounting.contacts
      tags:
      - Accounting
      - Contacts
      operationId: updateOrCreateContacts
      summary: Create or update contacts in bulk
      description: Creates new contacts or updates existing ones from the supplied request body and returns the stored resources
        in a Contacts response payload.
      parameters:
      - $ref: '#/components/parameters/summarizeErrors'
      - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '200':
          description: Success - return response of type Contacts array with newly created Contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contacts'
              example:
                Id: e997d6d7-6dad-4458-beb8-d9c1bf7f2edf
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1551399321121)/
                Contacts:
                - ContactID: 00000000-0000-0000-0000-000000000000
                  ContactStatus: ACTIVE
                  Name: Bruce Banner
                  CompanyNumber: NumberBusiness1234
                  EmailAddress: bruce@banner.com
                  BankAccountDetails: ''
                  Addresses:
                  - AddressType: STREET
                    City: ''
                    Region: ''
                    PostalCode: ''
                    Country: ''
                  - AddressType: POBOX
                    City: ''
                    Region: ''
                    PostalCode: ''
                    Country: ''
                  Phones:
                  - PhoneType: DEFAULT
                    PhoneNumber: ''
                    PhoneAreaCode: ''
                    PhoneCountryCode: ''
                  - PhoneType: DDI
                    PhoneNumber: ''
                    PhoneAreaCode: ''
                    PhoneCountryCode: ''
                  - PhoneType: FAX
                    PhoneNumber: ''
                    PhoneAreaCode: ''
                    PhoneCountryCode: ''
                  - PhoneType: MOBILE
                    PhoneNumber: 555-1212
                    PhoneAreaCode: '415'
                    PhoneCountryCode: ''
                  UpdatedDateUTC: /Date(1551399321043+0000)/
                  ContactGroups: []
                  IsSupplier: false
                  IsCustomer: false
                  SalesDefaultLineAmountType: INCLUSIVE
                  PurchasesDefaultLineAmountType: INCLUSIVE
                  SalesTrackingCategories: []
                  PurchasesTrackingCategories: []
                  PaymentTerms:
                    Bills:
                      Day: 15
                      Type: OFCURRENTMONTH
                    Sales:
                      Day: 10
                      Type: DAYSAFTERBILLMONTH
                  ContactPersons: []
                  HasValidationErrors: false
        '400':
          description: Validation Error - some data was incorrect returns response of type Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                ErrorNumber: 10
                Type: ValidationException
                Message: A validation exception occurred
                Elements:
                - ContactID: 00000000-0000-0000-0000-000000000000
                  AccountNumber: 12345-ABCD
                  Name: Buzz Lightyear
                  EmailAddress: buzzlightyear@email.com
                  AccountsReceivableTaxType: NONE
                  AccountsPayableTaxType: INPUT
                  Addresses:
                  - AddressType: STREET
                    AddressLine1: 101 Green St
                    AddressLine2: 5th floor
                    City: San Francisco
                    Region: CA
                    PostalCode: '94041'
                    Country: US
                    AttentionTo: Rod Drury
                    ValidationErrors: []
                  Phones:
                  - PhoneType: MOBILE
                    PhoneNumber: 555-1212
                    PhoneAreaCode: '415'
                    ValidationErrors: []
                  ContactGroups: []
                  PaymentTerms:
                    Bills:
                      Day: 15
                      Type: OFCURRENTMONTH
                      ValidationErrors: []
                    Sales:
                      Day: 10
                      Type: DAYSAFTERBILLMONTH
                      ValidationErrors: []
                  ContactPersons: []
                  HasValidationErrors: true
                  ValidationErrors:
                  - Message: The contact name Buzz Lightyear is already assigned to another contact. The contact name must
                      be unique across all active contacts.
        '500':
          $ref: '#/components/responses/500Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/429Error'
        '403':
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Contacts'
            example:
              Contacts:
              - Name: Bruce Banner
                EmailAddress: hulk@avengers.com
                Phones:
                - PhoneType: MOBILE
                  PhoneNumber: 555-1212
                  PhoneAreaCode: '415'
                PaymentTerms:
                  Bills:
                    Day: 15
                    Type: OFCURRENTMONTH
                  Sales:
                    Day: 10
                    Type: DAYSAFTERBILLMONTH
    get:
      security:
      - OAuth2:
        - accounting.contacts
        - accounting.contacts.read
      tags:
      - Accounting
      - Contacts
      operationId: getContacts
      summary: List contacts for the organisation
      description: Returns the organisation's contacts in a Contacts response payload. Use the available filtering, ordering,
        paging, or modified-since parameters when the endpoint exposes them.
      parameters:
      - $ref: '#/components/parameters/ifModifiedSince'
      - in: query
        name: where
        description: Filter by an any element
        example: ContactStatus==&quot;ACTIVE&quot;
        schema:
          type: string
          example: example
      - in: query
        name: order
        description: Order by an any element
        example: Name ASC
        schema:
          type: string
          example: example
      - in: query
        name: IDs
        description: Filter by a comma separated list of ContactIDs. Allows you to retrieve a specific set of contacts in
          a single call.
        style: form
        explode: false
        example: '&quot;00000000-0000-0000-0000-000000000000&quot;'
        schema:
          type: array
          items:
            type: string
            format: uuid
          example:
          - 00000000-0000-0000-0000-000000000000
      - in: query
        name: page
        description: e.g. page=1 - Up to 100 contacts will be returned in a single API call.
        example: 1
        schema:
          type: integer
          example: 1
      - in: query
        name: includeArchived
        description: e.g. includeArchived=true - Contacts with a status of ARCHIVED will be included in the response
        example: true
        schema:
          type: boolean
          example: false
      - $ref: '#/components/parameters/summaryOnly'
      - in: query
        name: searchTerm
        description: Search parameter that performs a case-insensitive text search across the Name, FirstName, LastName, ContactNumber
          and EmailAddress fields.
        example: Joe Bloggs
        schema:
          type: string
          example: SearchTerm=REF12
      - $ref: '#/components/parameters/pageSize'
      responses:
