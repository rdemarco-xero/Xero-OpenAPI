      - Contacts
      operationId: getContactByContactNumber
      summary: Get a contact by contact number
      description: Returns the contact identified by the supplied contact number in a Contacts response payload.
      parameters:
      - required: true
        in: path
        name: ContactNumber
        description: This field is read only on the Xero contact screen, used to identify contacts in external systems (max
          length = 50).
        example: SB2
        schema:
          type: string
          example: '12345'
