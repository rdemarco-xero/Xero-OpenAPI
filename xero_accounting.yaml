openapi: 3.0.0
info:
  title: Xero Accounting API
  description: The Xero Accounting API exposes accounting resources for working with contacts, transactions, reports, settings, and related organisation data.
  version: 12.0.0
  termsOfService: https://developer.xero.com/xero-developer-platform-terms-conditions/
  contact:
    name: Xero Platform Team
    email: api@xero.com
    url: https://developer.xero.com
servers:
- description: The Xero Accounting API exposes accounting and related functions of the main Xero application and can be used for a variety of purposes such as creating transactions like invoices and credit notes, right through to extracting accounting data via our reports endpoint.
  url: https://api.xero.com/api.xro/2.0
tags:
- name: Accounting
  description: Core accounting resources including accounts, invoices, contacts, payments, and reports.
- name: Settings
  description: Company settings and configuration resources such as tax rates, tracking categories, and payment services.
- name: Transactions
  description: Transactional accounting resources including invoices, payments, credit notes, and related money movement endpoints.
- name: Reports
  description: Reporting resources for financial statements and analysis endpoints.
- name: Contacts
  description: Contact and contact-group resources, including CIS and contact-level metadata endpoints.
- name: Attachments
  description: Binary/file attachment resources across accounting entities.
paths:
  /Accounts:
    summary: Manage chart of accounts entries
    description: Manage chart of accounts entries.
    parameters:
    - $ref: "#/components/parameters/requiredHeader"
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getAccounts
      summary: Retrieves the full chart of accounts
      description: Retrieves the full chart of accounts.
      parameters:
      - $ref: "#/components/parameters/ifModifiedSince"
      - in: query
        name: where
        description: Filter by an any element
        example: Status==&quot;ACTIVE&quot; AND Type==&quot;BANK&quot;
        x-example-csharp: Status==\"ACTIVE\"
        x-example-java: Status==&quot;&apos; + Account.StatusEnum.ACTIVE+ &apos;&quot;
        x-example-php: Status==&quot;&apos; . \XeroAPI\XeroPHP\Models\Accounting\Account::STATUS_ACTIVE . &apos;&quot;
        x-example-ruby: Status==#{XeroRuby::Accounting::Account::ACTIVE}
        schema:
          type: string
      - in: query
        name: order
        description: Order by an any element
        example: Name ASC
        schema:
          type: string
      responses:
        "200":
          description: Success - return response of type Accounts array with 0 to n Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Accounts"
              example:
                Accounts:
                - AccountID: ebd06280-af70-4bed-97c6-7451a454ad85
                  Code: "091"
                  Name: Business Savings Account
                  Type: BANK
                  TaxType: NONE
                  EnablePaymentsToAccount: false
                  BankAccountNumber: "0209087654321050"
                  BankAccountType: BANK
                  CurrencyCode: NZD
                - AccountID: 7d05a53d-613d-4eb2-a2fc-dcb6adb80b80
                  Code: "200"
                  Name: Sales
                  Type: REVENUE
                  TaxType: OUTPUT2
                  Description: Income from any normal business activity
                  EnablePaymentsToAccount: false
    put:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: createAccount
      summary: Creates a new chart of accounts
      description: Creates a new chart of accounts.
      parameters:
      - $ref: "#/components/parameters/idempotencyKey"
      x-hasAccountingValidationError: true
      x-example:
      - object:
        is_object: true
        key: account
        keyPascal: Account
      - code:
        key: code
        keyPascal: Code
        default: 123456
        object: account
      - name:
        key: name
        keyPascal: Name
        default: FooBar
        object: account
      - type:
        key: type
        keyPascal: Type
        default: EXPENSE
        nonString: true
        php: XeroAPI\XeroPHP\Models\Accounting\AccountType::EXPENSE
        node: AccountType.EXPENSE
        ruby: XeroRuby::Accounting::AccountType::EXPENSE
        python: AccountType.EXPENSE
        java: com.xero.models.accounting.AccountType.EXPENSE
        csharp: AccountType.EXPENSE
        object: account
      - description:
        is_last: true
        key: description
        keyPascal: Description
        default: Hello World
        object: account
      responses:
        "200":
          description: Success - created new Account and return response of type Accounts array with new Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Accounts"
              example:
                Id: 11814c9d-3b5e-492e-93b0-fad16bf3244f
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550793549392)/
                Accounts:
                - AccountID: 66b262e2-561e-423e-8937-47d558f13442
                  Code: "123456"
                  Name: Foobar
                  Status: ACTIVE
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Hello World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550793549320+0000)/
        "400":
          $ref: "#/components/responses/400Error"
      requestBody:
        required: true
        description: Account object in body of request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Account"
            example:
              Code: "123456"
              Name: Foobar
              Type: EXPENSE
              Description: Hello World
  /Accounts/{AccountID}:
    summary: Retrieve or update a specific account
    description: Retrieve or update a specific account.
    parameters:
    - $ref: "#/components/parameters/requiredHeader"
    get:
      security:
      - OAuth2:
        - accounting.settings
        - accounting.settings.read
      tags:
      - Accounting
      - Settings
      operationId: getAccount
      summary: Retrieves a single chart of accounts by using a unique account Id
      description: Retrieves a single chart of accounts by using a unique account Id.
      parameters:
      - $ref: "#/components/parameters/AccountID"
      responses:
        "200":
          description: Success - return response of type Accounts array with one Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Accounts"
              example:
                Id: 323455cc-9511-4451-a873-248d2983f38e
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550797359081)/
                Accounts:
                - AccountID: 99ce6032-0678-4aa0-8148-240c75fee33a
                  Code: "123456"
                  Name: FooBar
                  Status: ACTIVE
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Hello World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550797359120+0000)/
    post:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: updateAccount
      summary: Updates a chart of accounts
      description: Updates a chart of accounts.
      x-hasAccountingValidationError: true
      x-example:
      - account:
        is_object: true
        key: account
        keyPascal: Account
      - code:
        key: code
        keyPascal: Code
        default: 123456
        object: account
      - name:
        key: name
        keyPascal: Name
        default: BarFoo
        object: account
      - type:
        key: type
        keyPascal: Type
        default: EXPENSE
        nonString: true
        php: XeroAPI\XeroPHP\Models\Accounting\AccountType::EXPENSE
        node: AccountType.EXPENSE
        ruby: XeroRuby::Accounting::AccountType::EXPENSE
        python: AccountType.EXPENSE
        java: com.xero.models.accounting.AccountType.EXPENSE
        csharp: AccountType.EXPENSE
        object: account
      - description:
        key: description
        keyPascal: Description
        default: Hello World
        object: account
      - taxType:
        is_last: true
        key: taxType
        keyPascal: TaxType
        keySnake: tax_type
        default: NONE
        object: account
      - accounts:
        is_object: true
        key: accounts
        keyPascal: Accounts
      - accounts:
        is_last: true
        is_array_add: true
        key: accounts
        keyPascal: Accounts
        java: Accounts
        csharp: Account
        object: account
      parameters:
      - $ref: "#/components/parameters/AccountID"
      - $ref: "#/components/parameters/idempotencyKey"
      responses:
        "200":
          description: Success - update existing Account and return response of type Accounts array with updated Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Accounts"
              example:
                Id: 9012e75c-ec08-40a9-ae15-153fc1f35c4d
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550795389340)/
                Accounts:
                - AccountID: 99ce6032-0678-4aa0-8148-240c75fee33a
                  Code: "654321"
                  Name: BarFoo
                  Status: ACTIVE
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Good Bye World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550795389333+0000)/
        "400":
          $ref: '#/components/responses/400Error'
      requestBody:
        required: true
        description: Request of type Accounts array with one Account
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Accounts"
            example:
              Accounts:
              - Code: "123456"
                Name: BarFoo
                AccountID: 99ce6032-0678-4aa0-8148-240c75fee33a
                Type: EXPENSE
                Description: GoodBye World
                TaxType: INPUT
                EnablePaymentsToAccount: false
                ShowInExpenseClaims: false
                Class: EXPENSE
                ReportingCode: EXP
                ReportingCodeName: Expense
                UpdatedDateUTC: "2019-02-21T16:29:47.96-08:00"
    delete:
      security:
      - OAuth2:
        - accounting.settings
      tags:
      - Accounting
      - Settings
      operationId: deleteAccount
      x-hasAccountingValidationError: true
      summary: Deletes a chart of accounts
      description: Deletes a chart of accounts.
      parameters:
      - $ref: "#/components/parameters/AccountID"
      responses:
        "200":
          description: Success - delete existing Account and return response of type Accounts array with deleted Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Accounts"
              example:
                Id: 76bb0543-8efe-4acc-b7f6-67dfcdec37b4
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550798217216)/
                Accounts:
                - AccountID: 7f3c0bec-f3e7-4073-b4d6-cc56dd027ef1
                  Code: "123456"
                  Name: FooBar
                  Status: DELETED
                  Type: EXPENSE
                  TaxType: INPUT
                  Description: Hello World
                  Class: EXPENSE
                  EnablePaymentsToAccount: false
                  ShowInExpenseClaims: false
                  ReportingCode: EXP
                  ReportingCodeName: Expense
                  UpdatedDateUTC: /Date(1550798217210+0000)/
        "400":
          $ref: '#/components/responses/400Error'
  /Accounts/{AccountID}/Attachments:
    summary: List attachments on a specific account
    description: List attachments on a specific account.
    parameters:
    - $ref: "#/components/parameters/requiredHeader"
    get:
      security:
      - OAuth2:
        - accounting.attachments
        - accounting.attachments.read
      tags:
      - Accounting
      - Attachments
      operationId: getAccountAttachments
      summary: Retrieves attachments for a specific accounts by using a unique account Id
      description: Retrieves attachments for a specific accounts by using a unique account Id.
      parameters:
      - $ref: "#/components/parameters/AccountID"
      responses:
        "200":
          description: Success - return response of type Attachments array of Attachment
          x-isAttachment: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachments"
              example:
                Id: 439c1573-3cd8-4697-a9f6-81fa651ee8f3
                Status: OK
                ProviderName: Xero API Partner
                DateTimeUTC: /Date(1550852630329)/
                Attachments:
                - AttachmentID: 52a643be-cd5c-489f-9778-53a9fd337756
                  FileName: sample5.jpg
                  Url: https://api.xero.com/api.xro/2.0/Accounts/da962997-a8bd-4dff-9616-01cdc199283f/Attachments/sample5.jpg
                  MimeType: image/jpg
                  ContentLength: 2878711
  /Accounts/{AccountID}/Attachments/{AttachmentID}:
    summary: Retrieve a specific account attachment by ID
    description: Retrieve a specific account attachment by ID.
    parameters:
    - $ref: "#/components/parameters/requiredHeader"
    get:
      security:
      - OAuth2:
        - accounting.attachments
        - accounting.attachments.read
      tags:
      - Accounting
      - Attachments
      operationId: getAccountAttachmentById
      summary: Retrieves a specific attachment from a specific account using a unique attachment Id
      description: Retrieves a specific attachment from a specific account using a unique attachment Id.
      parameters:
      - $ref: "#/components/parameters/AccountID"
      - $ref: "#/components/parameters/AttachmentID"
      - $ref: "#/components/parameters/ContentType"
      responses:
        "200":
          description: Success - return response of attachment for Account as binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /Accounts/{AccountID}/Attachments/{FileName}:
    summary: Retrieve or upload an account attachment by file name
    description: Retrieve or upload an account attachment by file name.
    parameters:
    - $ref: "#/components/parameters/requiredHeader"
    get:
      security:
      - OAuth2:
        - accounting.attachments
        - accounting.attachments.read
