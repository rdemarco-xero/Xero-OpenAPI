    put:
      security:
      - OAuth2:
        - accounting.transactions
      tags:
      - Accounting
      - Transactions
      operationId: createBatchPayment
      summary: Creates one or many batch payments for invoices
      description: Creates one or many batch payments for invoices.
      x-hasAccountingValidationError: true
      x-example:
      - currDate:
        is_date: true
        key: currDate
        keyPascal: CurrDate
        keySnake: curr_date
        java_datatype: LocalDate
        default: LocalDate.now()
        java: LocalDate.now()
        csharp: DateTime.Now
        node: "'2020-12-10'"
        php: new DateTime('2020-12-10')
        python: dateutil.parser.parse('2020-12-03T00:00:00Z')
        ruby: "'YYYY-MM-DD'"
      - paymentAccount:
        is_object: true
        key: paymentAccount
        keyPascal: Account
        keySnake: payment_account
      - accountID:
        is_last: true
        is_uuid: true
        key: accountID
        keyPascal: AccountID
        keySnake: account_id
        default: 00000000-0000-0000-0000-000000000000
        object: paymentAccount
      - bankAccount:
        is_object: true
        key: bankAccount
        keyPascal: Account
        keySnake: bank_account
      - accountID:
        is_last: true
        is_uuid: true
        key: accountID
        keyPascal: AccountID
        keySnake: account_id
        default: 00000000-0000-0000-0000-000000000000
        object: bankAccount
      - invoice:
        is_object: true
        key: invoice
        keyPascal: Invoice
      - invoiceID:
        is_last: true
        is_uuid: true
        key: invoiceID
        keyPascal: InvoiceID
        keySnake: invoice_id
        default: 00000000-0000-0000-0000-000000000000
        object: invoice
      - payment:
        is_object: true
        key: payment
        keyPascal: Payment
      - set_bankaccount:
        is_variable: true
        nonString: true
        key: account
        keyPascal: Account
        default: bankAccount
        python: bank_account
        ruby: bank_account
        object: payment
      - date:
        is_variable: true
        nonString: true
        key: date
        keyPascal: Date
        default: currDate
        python: curr_date
        ruby: curr_date
        object: payment
      - amount:
        nonString: true
        key: amount
        keyPascal: Amount
        default: 1.00
        is_money: true
        object: payment
      - set_invoice:
        is_last: true
        is_variable: true
        nonString: true
        key: invoice
        keyPascal: Invoice
        default: invoice
        object: payment
      - payments:
        is_list: true
        key: payments
        keyPascal: Payment
      - add_payments:
        is_last: true
        is_list_add: true
        key: payments
        keyPascal: Payments
        object: payment
      - batchPayment:
        is_object: true
        key: batchPayment
        keyPascal: BatchPayment
        keySnake: batch_payment
      - set_paymentaccount:
        is_variable: true
        nonString: true
        key: account
        keyPascal: Account
        default: paymentAccount
        python: payment_account
        ruby: payment_account
        object: batchPayment
      - reference:
        key: reference
        keyPascal: Reference
        default: hello foobar
